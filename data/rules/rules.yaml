# 1. ボールは「自分より後ろ」に動かす (backward-ball)
- id: "knock-forward"
  title: "ノックフォワード / ノックオン"
  description: "ボールを前に落としたり、手や腕で前に弾いたりすること。相手ボールのスクラムで再開される 。"
  detail: "プレーヤーがボールを落としてボールが前方へ進む、または手や腕で前方へたたく行為。意図的でなくても反則となるが、相手が蹴った直後のボールをブロックする「チャージダウン」は反則ではない 。"
  level: "初級"
  principleId: "backward-ball"
  icon: "⚠️"
  illustration: "/rules/knock-forward.png"
  relatedRuleIds: ["throw-forward", "not-straight"]
  relatedSetPieceIds: ["scrum"]
  conversation:
    - speaker: "リッチーくん"
      message: "今の落としただけに見えたけどダメなの！？"
    - speaker: "ライゾウ"
      message: "前に落ちた時点で反則だ。意図は関係ない。"
    - speaker: "リッチーくん"
      message: "えー！ミスでもダメなんだ…！"
    - speaker: "ライゾウ"
      message: "だからこそ基本のキャッチ精度が勝負を分ける。"
  createdAt: "2026-04-10"
  updatedAt: "2026-04-10"
  isFeatured: true

- id: "throw-forward"
  title: "スローフォワード"
  description: "ボールを自分より前方の味方にパスすること 。"
  detail: "ラグビーの最も基本的なルール。パスは自分より後ろ、または真横に投げなければならない。走っている勢いでボールが前に流れてしまった場合も反則となる 。"
  level: "初級"
  principleId: "backward-ball"
  icon: "🏉"
  illustration: "/rules/throw-forward.png"
  relatedRuleIds: ["knock-forward"]
  relatedSetPieceIds: ["scrum"]
  conversation:
    - speaker: "リッチーくん"
      message: "今ちょっと前に投げたよね！？"
    - speaker: "ライゾウ"
      message: "ああ、あれはスローフォワードだ。"
    - speaker: "リッチーくん"
      message: "走ってたから前にいっちゃっただけじゃないの？"
    - speaker: "ライゾウ"
      message: "それでもダメだ。基準は“手から離れた瞬間の方向”だ。"
  createdAt: "2026-04-10"
  updatedAt: "2026-04-18"
  isFeatured: true

- id: "not-straight"
  title: "ノットストレート"
  description: "スクラムやラインアウトで、ボールをまっすぐ投入しないこと 。"
  detail: "セットプレーにおける公平性を保つためのルール。ラインアウトでは両チームの真ん中に、スクラムでは中央のトンネルにまっすぐ入れなければならない。相手ボールの選択肢（スクラムかラインアウト）で再開される 。"
  level: "中級"
  principleId: "backward-ball"
  icon: "📏"
  illustration: "/rules/not-straight.png"
  relatedRuleIds: []
  relatedSetPieceIds: ["scrum"]
  conversation:
    - speaker: "リッチーくん"
      message: "え、なんで今やり直しなの？普通に投げてたよ？"
    - speaker: "ライゾウ"
      message: "まっすぐじゃなかった。あれでは片方が有利になる。"
    - speaker: "リッチーくん"
      message: "そんな細かいんだ！"
    - speaker: "ライゾウ"
      message: "セットプレーは公平性が最優先だ。"

- id: "fifty-22"
  title: "50:22"
  description: "自陣から蹴ったキックが相手の22m区域内でバウンドしてタッチを割ると、蹴った側のラインアウトで再開される。"
  detail: "2021年に導入された比較的新しいルール。通常、キックが直接タッチを割ると相手ボールのラインアウトになるが、50:22では自陣（ハーフウェイラインより後ろ）から蹴ったキックが相手の22mエリア内でバウンドしてからタッチを割った場合、蹴った側のラインアウトで再開される。キックの戦術的価値を大きく変えたルール。"
  level: "中級"
  principleId: "backward-ball"
  icon: "🦶"
  illustration: "/rules/fifty-22.png"
  relatedRuleIds: ["knock-forward"]
  relatedSetPieceIds: ["lineout"]
  conversation:
    - speaker: "リッチーくん"
      message: "50:22って何？数字の意味がわからない…"
    - speaker: "ライゾウ"
      message: "自陣の50m（ハーフウェイ）より後ろから蹴って、相手の22mエリア内でバウンドしてタッチを割ると、蹴った側のラインアウトになるんだ。"
    - speaker: "リッチーくん"
      message: "普通は相手ボールになるのに！？すごいご褒美だね！"
    - speaker: "ライゾウ"
      message: "そう。だからバックスのキック精度がより重要になった。このルールで試合の戦術が大きく変わったんだよ。"
  createdAt: "2026-04-12"
  updatedAt: "2026-04-23"
  isFeatured: true

# 2. プレーは必ず「立った状態」で行う (stay-on-feet)
- id: "not-release-the-ball"
  title: "ノットリリースザボール"
  description: "タックルされて倒れた選手が、ボールをすぐに離さないこと 。"
  detail: "倒れた選手はそれ以上プレーを継続できない。速やかにボールを放すか、パス、あるいは置くことで、次の争奪ができる状態にしなければならない。放置すると相手のペナルティとなる 。"
  level: "初級"
  principleId: "stay-on-feet"
  icon: "🤲"
  illustration: "/rules/not-release-the-ball.png"
  relatedRuleIds: ["not-roll-away"]
  relatedSetPieceIds: []
  conversation:
    - speaker: "リッチーくん"
      message: "なんで今止められたの！？まだ持ってたのに！"
    - speaker: "ライゾウ"
      message: "倒れたら終わりだ。すぐ離さないといけない。"
    - speaker: "リッチーくん"
      message: "まだチャンスありそうだったのに〜！"
    - speaker: "ライゾウ"
      message: "そこで粘るとゲームが止まる。だから即判断が必要だ。"

- id: "not-roll-away"
  title: "ノットロールアウェイ"
  description: "タックルした選手、またはされた選手が、ボール付近からどかないこと 。"
  detail: "倒れた選手がその場に留まり続けると、ボールの争奪やスムーズな継続を妨げてしまう。タックラー（タックルした側）は、倒れた後すぐに相手を放し、ボールから離れるか立ち上がらなければならない 。"
  level: "初級"
  principleId: "stay-on-feet"
  icon: "🔄"
  illustration: "/rules/not-roll-away.png"
  relatedRuleIds: ["not-release-the-ball"]
  relatedSetPieceIds: []
  conversation:
    - speaker: "リッチーくん"
      message: "え、タックル成功してるのに反則！？"
    - speaker: "ライゾウ"
      message: "その後が問題だ。離れないといけない。"
    - speaker: "リッチーくん"
      message: "やりきったのにダメなんだ！"
    - speaker: "ライゾウ"
      message: "タックルは“終わりまでやって成立”だ。"

- id: "off-feet"
  title: "オフフィート"
  description: "密集（ラックやモール）などで自立せず、倒れ込んでプレーを妨げること 。"
  detail: "「プレーヤーは常に自分の足で立っていなければならない」という原則に反する行為。故意に倒れ込んでボールを覆い隠したり、相手の獲得を邪魔したりすると反則となる 。"
  level: "中級"
  principleId: "stay-on-feet"
  icon: "🦶"
  illustration: "/rules/off-feet.png"
  relatedRuleIds: []
  relatedSetPieceId: []
  conversation:
    - speaker: "リッチーくん"
      message: "なんで倒れただけで反則なの？"
    - speaker: "ライゾウ"
      message: "立っていないと正しい争奪ができない。"
    - speaker: "リッチーくん"
      message: "確かにぐちゃぐちゃになるもんね…！"
    - speaker: "ライゾウ"
      message: "だから“立つ”ことが前提になる。"

# 3. 常に「ボールより後ろ」でプレーする (offside-line)
- id: "offside"
  title: "オフサイド"
  description: "ボールより前の、プレーに参加してはいけない位置にいること 。"
  detail: "位置に関する最も基本的な反則。ボールを保持している味方、または最後にプレーした味方より前にいるプレーヤーは、プレーに参加したり相手を妨害したりしてはならない 。"
  level: "初級"
  principleId: "offside-line"
  icon: "🚫"
  illustration: "/rules/offside.png"
  relatedRuleIds: ["ten-meter-rule"]
  relatedSetPieceId: ""
  relatedSetPieceIds: []
  conversation:
    - speaker: "リッチーくん"
      message: "なんであの人動いちゃダメなの！？"
    - speaker: "ライゾウ"
      message: "ボールより前にいる。あれはオフサイドだ。"
    - speaker: "リッチーくん"
      message: "ちょっとくらいいいじゃんって思っちゃう…！"
    - speaker: "ライゾウ"
      message: "その一歩が大きな差になる。だから厳密なんだ。"

- id: "ten-meter-rule"
  title: "10メートル規則"
  description: "味方のキックに対し、前方にいた選手はボールが落ちた地点から10m離れなければならない 。"
  detail: "味方が蹴った際、そのキッカーより前にいた選手は、落下地点の相手を待ち伏せしてはならない。オンサイドになるまで、落下地点から10mのラインより後方に下がる努力が必要 。"
  level: "中級"
  principleId: "offside-line"
  icon: "📏"
  illustration: "/rules/ten-meter-rule.png"
  relatedRuleIds: ["offside"]
  relatedSetPieceIds: []
  conversation:
    - speaker: "リッチーくん"
      message: "え！？なんで急に下がってるの！？"
    - speaker: "ライゾウ"
      message: "キックの後は10m離れないといけない。"
    - speaker: "リッチーくん"
      message: "待ち伏せ禁止ってこと！？"
    - speaker: "ライゾウ"
      message: "そうだ。公平な競り合いを作るためだ。"

- id: "accidental-offside"
  title: "アクシデンタルオフサイド"
  description: "ボールが偶然、オフサイドの位置にいる味方に当たってしまうこと 。"
  detail: "故意ではなく、やむを得ず触れてしまった場合のオフサイド。反則をした側のチームが利益を得る場合のみ、プレーが停止され、スクラムで再開される 。"
  level: "中級"
  principleId: "offside-line"
  icon: "❓"
  illustration: "/rules/accidental-offside.png"
  relatedRuleIds: []
  relatedSetPieceIds: ["scrum"]
  conversation:
    - speaker: "リッチーくん"
      message: "え、今のも反則！？当たっただけじゃん！"
    - speaker: "ライゾウ"
      message: "意図はないが、結果として前にいる味方が関与した。"
    - speaker: "リッチーくん"
      message: "なんかかわいそう…！"
    - speaker: "ライゾウ"
      message: "だから状況次第で流されることもある。"

# 4. ボールを持っていない選手を邪魔しない (fare-play-spirit)
- id: "obstruction"
  title: "オブストラクション"
  description: "ボールを持っていない選手が、相手のプレーを不正に邪魔すること 。"
  detail: "ボールに向かって走っている相手を押したり、タックルしようとする相手をブロックしたりする行為。ラグビーは「ボールの争奪」を重んじるため、ボールに関係ない妨害は厳しく罰せられる 。"
  level: "中級"
  principleId: "fare-play-spirit"
  icon: "🚫"
  illustration: "/rules/obstruction.png"
  relatedRuleIds: ["shepherding"]
  relatedSetPieceIds: []
  conversation:
    - speaker: "リッチーくん"
      message: "あれナイスブロックじゃないの！？"
    - speaker: "ライゾウ"
      message: "ラグビーではそれは反則だ。"
    - speaker: "リッチーくん"
      message: "えー！守ってあげてるのに！"
    - speaker: "ライゾウ"
      message: "ボールに関係ない妨害は禁止されている。"

- id: "tackle-player-without-ball"
  title: "ボールを保持していないプレーヤーへのタックル / ノーボールタックル"
  description: "ボールを持っていない相手を捕まえたり、倒したりすること。"
  detail: "ラグビーでタックルして良いのはボールを保持しているプレーヤーのみ。パスを放した後の選手や、これからボールをキャッチしようとしている選手を倒す行為は「不正なプレー」としてペナルティの対象となる。"
  level: "中級"
  principleId: "fare-play-spirit"
  icon: "🧍"
  illustration: "/rules/tackle-non-carrier.png"
  relatedRuleIds: ["obstruction"]
  relatedSetPieceIds: []
  conversation:
    - speaker: "リッチーくん"
      message: "え！？今のタックルめっちゃいいタイミングじゃなかった！？"
    - speaker: "ライゾウ"
      message: "ボールをまだ持っていない。だから反則だ。"
    - speaker: "リッチーくん"
      message: "えー！もうすぐキャッチしそうだったのに！？"
    - speaker: "ライゾウ"
      message: "“持った後”じゃないとタックルは成立しない。"
    - speaker: "リッチーくん"
      message: "じゃあ一瞬でも早いと全部ダメってこと！？難しい…！"
    - speaker: "ライゾウ"
      message: "だからディフェンスは“待つ勇気”が必要になる。"
    - speaker: "リッチーくん"
      message: "でもなんでそんな厳しいの？"
    - speaker: "ライゾウ"
      message: "無防備な状態で当たると危険だからだ。安全と公平性、両方を守るルールだな。"


- id: "holding-pushing-non-ball-carrier"
  title: "ボールを持っていない選手を捕まえる・押す"
  description: "ボールを持っていない相手を掴んだり、押したりしてプレーを妨げること。"
  detail: "スクラム、ラック、モールなどの密集以外で、ボールを持っていない選手を捕まえたり、突き飛ばしたりする行為は「妨害」として禁じられています。ボールの争奪に直接関係のない場所での接触は、フェアプレーの精神に反するプレーとみなされます。"
  level: "中級"
  principleId: "fare-play-spirit"
  icon: "🤝"
  illustration: "/rules/holding-non-carrier.png"
  relatedRuleIds: ["obstruction", "tackle-player-without-ball"]
  relatedSetPieceIds: []
  conversation:
    - speaker: "リッチーくん"
      message: "え、ボール持ってないのに押しちゃダメなの！？"
    - speaker: "ライゾウ"
      message: "ああ。ボールに関係ない接触は妨害になる。"
    - speaker: "リッチーくん"
      message: "でもスペース空けるために押したくなるよね！？"
    - speaker: "ライゾウ"
      message: "それを許すと、ボールと関係ないところで勝負が決まる。"
    - speaker: "リッチーくん"
      message: "確かに…ボール見てるのに関係ないところで倒されたら変だね！"
    - speaker: "ライゾウ"
      message: "ラグビーはあくまで“ボールの争奪”が中心だ。"

# 5. 安全に、かつ正しく「争奪(コンテスト)」する (contest)
- id: "not-straight"
  title: "ノットストレート"
  description: "ラインアウトで、ボールを両チームの真ん中にまっすぐ投げ入れないこと。"
  detail: "タッチからボールを投げ入れる際、自チーム側に寄せて投げるなど、空中での公平な争奪を妨げる行為。投げ入れたボールが、少なくとも5メートルはまっすぐ飛ばなければなりません。相手チームは、スクラムまたはラインアウトのいずれかで再開することを選択できます。"
  level: "初級"
  principleId: "contest"
  icon: "📐"
  illustration: "/rules/lnot-straight.png"
  relatedRuleIds: ["not-straight"]
  relatedSetPieceIds: []
  conversation:
    - speaker: "リッチーくん"
      message: "今の投げ方、普通に見えたけどダメなの！？"
    - speaker: "ライゾウ"
      message: "まっすぐ入っていない。あれはノットストレートだ。"
    - speaker: "リッチーくん"
      message: "ちょっとくらいズレてもよくない？"
    - speaker: "ライゾウ"
      message: "それだと最初からどちらかが有利になる。"
    - speaker: "リッチーくん"
      message: "ジャンプする前に勝負決まっちゃうってこと！？"
    - speaker: "ライゾウ"
      message: "そうだ。だから“空中で公平に競る”ために厳密なんだ。"

- id: "collapsing"
  title: "コラプシング"
  description: "スクラム、ラック、モールを故意に崩すこと 。"
  detail: "密集戦で相手の力に抗いきれず、わざと膝をついたり相手を引き倒したりして崩す行為。選手の重なりによる怪我のリスクが非常に高いため、危険なプレーとして厳しく罰せられる 。"
  level: "中級"
  principleId: "contest"
  icon: "⬇️"
  illustration: "/rules/collapsing.png"
  relatedRuleIds: []
  relatedSetPieceIds: []
  conversation:
    - speaker: "リッチーくん"
      message: "なんで崩したらダメなの？押されてたのに！"
    - speaker: "ライゾウ"
      message: "安全性の問題だ。下敷きになる危険がある。"
    - speaker: "リッチーくん"
      message: "確かにあれは怖い…！"
    - speaker: "ライゾウ"
      message: "だから“崩さない”が大前提だ。"

- id: "wrong-direction-entry"
  title: "誤った方向からの参加（ゲート）"
  description: "密集戦に横から入ること。必ず自陣側の最後尾から参加しなければならない 。"
  detail: "ラックやモールに参加する際は、仮想の門（ゲート）を通るように、自陣側の最後尾からまっすぐ入らなければならない。横から入る行為は「サイドエントリー」とも呼ばれ反則となる 。"
  level: "中級"
  principleId: "contest"
  icon: "🚪"
  illustration: "/rules/gate-entry.png"
  relatedRuleIds: []
  relatedSetPieceIds: []
  conversation:
    - speaker: "リッチーくん"
      message: "なんで横から入っちゃダメなの！？近いのに！"
    - speaker: "ライゾウ"
      message: "それだと争奪が成立しない。正面から入る必要がある。"
    - speaker: "リッチーくん"
      message: "ちゃんとルートがあるんだ！"
    - speaker: "ライゾウ"
      message: "ああ、“ゲート”が基準になる。"

# 6. 危険なプレーは一切禁止する (player-safety)
- id: "high-tackle"
  title: "ハイタックル"
  description: "肩の線より上（首や頭）へのタックル。非常に危険な行為 。"
  detail: "相手の安全を守るため、肩より上への接触は厳しく制限されている。故意でなくても、相手の頭部にダメージを与える可能性がある場合は、イエローカードやレッドカードの対象となる 。"
  level: "初級"
  principleId: "player-safety"
  icon: "💥"
  illustration: "/rules/high-tackle.png"
  relatedRuleIds: ["shoulder-charge"]
  relatedSetPieceIds: []
  conversation:
    - speaker: "リッチーくん"
      message: "うわ！今の危ない！！"
    - speaker: "ライゾウ"
      message: "頭部への接触だ。厳しく取られる。"
    - speaker: "リッチーくん"
      message: "あれは怖いよ…！"
    - speaker: "ライゾウ"
      message: "安全は最優先だ。"

- id: "shoulder-charge"
  title: "ショルダーチャージ / ノーアームタックル"
  description: "腕を使わずに、肩などで相手に体当たりするタックル 。"
  detail: "タックルをする際は、必ず腕で相手を捕まえようとしなければならない（バインド）。腕を使わず肩だけでぶつかる行為は、大きな衝撃を伴い危険なため禁止されている 。"
  level: "中級"
  principleId: "player-safety"
  icon: "💪"
  illustration: "/rules/shoulder-charge.png"
  relatedRuleIds: ["high-tackle"]
  relatedSetPieceIds: []
  conversation:
    - speaker: "リッチーくん"
      message: "え！？ぶつかっただけでダメ！？"
    - speaker: "ライゾウ"
      message: "腕で捕まえていない。危険なタックルだ。"
    - speaker: "リッチーくん"
      message: "見た目めっちゃ強そうなのに…！"
    - speaker: "ライゾウ"
      message: "強さより安全だ。"

- id: "late-charge"
  title: "レイトチャージ / レイトタックル"
  description: "ボールを蹴った（またはパスした）後の選手に衝突すること 。"
  detail: "ボールを蹴り終わった選手は無防備であり、その後にタックルや衝突をすることは極めて危険。反則地点かボールの着地点、どちらか有利な方でペナルティキックが与えられる 。"
  level: "中級"
