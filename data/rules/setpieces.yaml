- id: "scrum"
  title: "スクラム"
  icon: "🔄"
  description: "軽い反則の後、両チームのフォワード8人ずつが組んで、ボールを奪い合うセットプレー。"
  detail: "ノックオンやスローフォワードなどの軽い反則の後に行われる。両チームのフォワード8人が3列に組み合い、スクラムハーフがボールを投入する。フッカーが足でボールを掻き出し、No.8がコントロールしてスクラムハーフに渡す。押し込みでプレッシャーをかけることで相手のボール確保を妨害できる。"
  points:
    - "フッカーがボールを足で掻き出す"
    - "押し込みでプレッシャーをかける"
    - "スクラムハーフがボールを供給"
    - "8人の結束力が問われる"
  triggerConditions:
    - "ノックオン（ボールを前に落とす）"
    - "スローフォワード（前方へのパス）"
    - "アクシデンタルオフサイド"
  relatedRuleIds: ["knock-forward", "throw-forward"]
  illustration: "/rules/scrum.png"
  conversation:
    - speaker: "リッチーくん"
      message: "スクラムってなんで組むの？試合が止まっちゃうじゃん。"
    - speaker: "ライゾウ"
      message: "軽い反則があったときに、フェアにボールを再開するための仕組みなんだ。ノックオンとかスローフォワードの後に組むよ。"
    - speaker: "リッチーくん"
      message: "でも反則した方がボールもらえないんでしょ？じゃあ意味ないんじゃ…"
    - speaker: "ライゾウ"
      message: "実はスクラムは押し込みで逆転できるんだ。FWが強ければ相手ボールでも奪えるし、ペナルティを誘えることもある。だからスクラムの強さはチームの武器になるんだよ。"

- id: "lineout"
  title: "ラインアウト"
  icon: "⬆️"
  description: "ボールがタッチラインの外に出た後、タッチラインから投げ入れて再開するセットプレー。"
  detail: "ボールがタッチラインを越えた場合に行われる。投げ入れる権利は、最後にボールに触れたチームの相手側が持つ（ペナルティキックでタッチに蹴り出した場合は蹴った側）。フッカーが投げ入れ、ジャンパーが空中でキャッチし、リフターが持ち上げる。サインプレーで投げる位置やタイミングを変える戦術が重要。"
  points:
    - "フッカーが投げ入れる"
    - "ジャンパーが空中でキャッチ"
    - "リフターが持ち上げる"
    - "サインプレーで相手を欺く"
  triggerConditions:
    - "ボールがタッチラインを越えた"
    - "ペナルティキックでタッチに蹴り出した"
  relatedRuleIds: ["lineout-not-straight"]
  illustration: "/rules/lineout.png"
  conversation:
    - speaker: "リッチーくん"
      message: "ラインアウトって、ただ投げて取るだけじゃないの？"
    - speaker: "ライゾウ"
      message: "全然違うよ！サインプレーで投げる位置を変えたり、フェイクを入れたり。空中戦だから、タイミングが命なんだ。"
    - speaker: "リッチーくん"
      message: "持ち上げてる人たちも大変そう…"
    - speaker: "ライゾウ"
      message: "リフターの技術も重要だね。ジャンパーを正確に持ち上げて、相手より高い位置でキャッチさせる。チームワークの結晶だよ。"

- id: "ruck"
  title: "ラック"
  icon: "⚡"
  description: "タックル後、地面にあるボールの上に両チームの選手が立って形成される密集状態。"
  detail: "タックルが成立した後、ボールが地面にある状態で、両チームの選手がボールの上に立って押し合う密集。ラックが形成されると手でボールを触ることはできず、足で掻き出すか、押し込みでボールを確保する。攻撃の継続性を左右する最も頻繁に発生するプレー。"
  points:
    - "ボールを確保するために入る"
    - "立ったまま押し合う"
    - "手でボールを触ってはいけない"
    - "素早い到着が鍵"
  triggerConditions:
    - "タックルが成立しボールが地面にある"
    - "両チームの選手がボール上で接触"
  relatedRuleIds: ["not-release", "not-roll-away", "off-feet", "ruck-entry", "sealing-off"]
  illustration: "/rules/ruck.png"
  conversation:
    - speaker: "リッチーくん"
      message: "ラックって毎回できるけど、何が起きてるの？"
    - speaker: "ライゾウ"
      message: "タックルの後、ボールを確保するための戦いだよ。攻撃側はボールを守り、ディフェンス側は奪おうとする。"
    - speaker: "リッチーくん"
      message: "手で取っちゃダメなの？"
    - speaker: "ライゾウ"
      message: "ラックが形成されたら手は使えない。だから体で押し込んでボールを確保するんだ。ここでの到着スピードが攻撃のテンポを決めるよ。"

- id: "maul"
  title: "モール"
  icon: "🏋️"
  description: "ボールキャリアが立ったまま、両チームの選手に囲まれて形成される密集状態。"
  detail: "ボールキャリアが立った状態で、味方と相手の選手に囲まれて形成される密集。ラックとの違いは、ボールが地面にないこと。モールは前に押し込むことができ、ゴールライン前での攻撃手段として非常に強力。ラインアウトからのモールは得点パターンの定番。"
  points:
    - "ボールキャリアは立っている"
    - "前に押し込むことができる"
    - "崩すと反則になる"
    - "ゴール前の強力な武器"
  triggerConditions:
    - "ボールキャリアが立った状態で相手と味方に囲まれる"
    - "ラインアウトからの展開"
  relatedRuleIds: []
  illustration: "/rules/maul.png"
  conversation:
    - speaker: "リッチーくん"
      message: "モールとラックって何が違うの？"
    - speaker: "ライゾウ"
      message: "一番の違いはボールの位置。ラックはボールが地面にあるけど、モールはボールキャリアが立ったまま持っている。"
    - speaker: "リッチーくん"
      message: "モールの方が強そう！"
    - speaker: "ライゾウ"
      message: "ゴール前のモールは本当に強力だよ。FW8人で押し込めばほぼ止められない。だからラインアウトモールは得点パターンの定番なんだ。"
