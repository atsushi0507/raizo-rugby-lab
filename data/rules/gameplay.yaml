# 試合の進め方
- id: "mark"
  title: "マーク（フェアキャッチ）"
  icon: "✋"
  description: "自陣22m区域内で相手のキックを直接キャッチし「マーク！」と叫ぶことで、フリーキックを得る権利。"
  detail: "自陣22メートルライン内で、相手が蹴ったボールをノーバウンドでキャッチし、同時に「マーク！」と叫ぶことで成立する。成立するとフリーキックが与えられ、プレッシャーなくキックで陣地を回復できる。ディフェンスの重要な戦術オプション。"
  relatedRuleIds: []
  relatedItemIds: ["free-kick", "22m-area"]
  illustration: "/rules/mark.png"
  conversation:
    - speaker: "リッチーくん"
      message: "マーク！って叫んでる人いるけど、あれ何？"
    - speaker: "ライゾウ"
      message: "自陣22m内で相手のキックをノーバウンドでキャッチして叫ぶと、フリーキックがもらえるんだ。プレッシャーなくキックできるから、陣地回復に使える。"

- id: "advantage"
  title: "アドバンテージ"
  icon: "▶️"
  description: "反則があっても、反則をしていない側に利益がある場合はプレーを止めない仕組み。"
  detail: "反則が起きても、反則をされた側がボールを持って有利な状況にある場合、レフリーはプレーを止めずに続行させる。アドバンテージが十分に得られたと判断されればプレー続行、得られなければ反則地点に戻る。ラグビー特有の仕組みで、試合の流れを保つ重要なルール。"
  relatedRuleIds: []
  relatedItemIds: []
  illustration: "/rules/advantage.png"
  conversation:
    - speaker: "リッチーくん"
      message: "反則なのにプレーが続くのはなんで？"
    - speaker: "ライゾウ"
      message: "反則された側が有利な状況なら、止めない方が得だからだよ。うまくいかなかったら反則地点に戻れるから、損はしない仕組みなんだ。"

- id: "tmo"
  title: "TMO（テレビジョン・マッチ・オフィシャル）"
  icon: "📺"
  description: "レフリーがビデオ判定を行う仕組み。現代の試合ではほぼ毎回発生する。"
  detail: "トライの判定やファウルプレーの確認など、重要な場面でレフリーがビデオ映像を確認して判定を行う仕組み。TMOが介入すると試合が一時中断される。正確な判定のために不可欠だが、中断時間が長くなることもある。"
  relatedRuleIds: []
  relatedItemIds: []
  illustration: "/rules/tmo.png"
  conversation:
    - speaker: "リッチーくん"
      message: "試合が止まって画面見てるのは何してるの？"
    - speaker: "ライゾウ"
      message: "TMOだよ。ビデオで確認してるんだ。トライが本当に成立してるか、危険なプレーがなかったかをチェックしてる。"

- id: "sin-bin"
  title: "シンビン（イエローカード）"
  icon: "🟨"
  description: "反則による10分間の一時的退出。試合展開に直結する。"
  detail: "繰り返しの反則や悪質なプレーに対して、レフリーがイエローカードを提示し、10分間の一時退出を命じる。退出中はチームが1人少ない状態（14人）でプレーしなければならず、数的不利は試合展開に大きく影響する。"
  relatedRuleIds: []
  relatedItemIds: ["red-card"]
  illustration: "/rules/sin-bin.png"
  conversation:
    - speaker: "リッチーくん"
      message: "イエローカードもらったらどうなるの？"
    - speaker: "ライゾウ"
      message: "10分間退場。その間チームは14人で戦わなきゃいけない。1人少ないのは想像以上にキツいよ。"

- id: "red-card"
  title: "レッドカード / 退出"
  icon: "🟥"
  description: "重大な反則による退場。原則として残りの試合に出場できず、チームは数的不利となる。"
  detail: "極めて危険なプレーや悪質な行為に対して提示されます。退出となったプレーヤーについて交替や入替えはできません。ただし、2026年度の競技規則（エリートレベルのみ）では、故意かつ極めて危険な行為を除き、20分間の競技時間が経過した後に別のプレーヤーと交替できる「20分レッドカード」という仕組みが導入されています。"
  level: "中級"
  principleId: "player-safety" # 危険プレー禁止の原則に関連
  relatedRuleIds: ["high-tackle", "dangerous-tackle"]
  relatedItemIds: ["sin-bin", "off-field-review"]
  illustration: "/rules/red-card.png"
  conversation:
    - speaker: "リッチーくん"
      message: "レッドカードって、出されたらそのチームはずっと1人少ないままなの？"
    - speaker: "ライゾウ"
      message: "基本はそうだけど、最近の大きな試合では『20分レッドカード』というルールがある。すごく悪質な場合を除いて、20分経てば代わりの選手が入れるようになっているんだ。"
    - speaker: "リッチーくん"
      message: "それでも20分間は1人少ないし、出された選手はもう戻れないんだね。やっぱり一番重い罰だ！"

- id: "off-field-review"
  title: "オフフィールドレビュー / バンカーシステム"
  icon: "🖥️"
  description: "カードの色の判断（イエローかレッドか）を、プレーを止めずに裏側で詳しく検証する仕組み。"
  detail: "レフリーがその場でカードの色を確定できない場合、少なくともイエローカードに値すると判断した上で「オフフィールドレビュー」を宣言します。選手が10分間の一時的退出（シンビン）をしている間に、ファウルプレーレビューオフィサーが映像を精査し、イエローのままにするか、レッドカードへ格上げするかを決定します。"
  level: "中級"
  principleId: "player-safety"
  relatedRuleIds: ["high-tackle"]
  relatedItemIds: ["red-card", "sin-bin", "tmo"]
  illustration: "/rules/off-field-review.png"
  conversation:
    - speaker: "リッチーくん"
      message: "レフリーがクロスさせた腕を顔の前でクロスさせて四角を作るジェスチャー（TMO）の後に、さらに何かを確認しているみたいだけど…"
    - speaker: "ライゾウ"
      message: "それは『バンカー（オフフィールドレビュー）』だね。試合を長く止めないために、難しい判定は専門のオフィシャルに任せて、裏で詳しくチェックしてもらう仕組みなんだ。"
    - speaker: "リッチーくん"
      message: "イエローだと思ってたら、いつの間にかレッドに変わってることもあるのはそのせいか！"

- id: "22m-area"
  title: "22メートル区域（陣取りのルール）"
  icon: "📏"
  description: "このエリア内からのキックルールが変わるため、観戦時の「なぜ？」を解消する重要な区域。"
  detail: "自陣22メートルライン内からキックしてボールが直接タッチラインを越えた場合、ボールが出た地点でラインアウトとなる（地域獲得）。22メートルラインの外からの場合は、蹴った地点に戻されるため地域獲得できない。この違いが「なぜあそこまで下がってからキックしたのか」の答えになる。"
  relatedRuleIds: []
  relatedItemIds: ["mark"]
  illustration: "/rules/22m-area.png"
  conversation:
    - speaker: "リッチーくん"
      message: "なんでわざわざ後ろに下がってからキックするの？"
    - speaker: "ライゾウ"
      message: "22mラインの内側からキックすると、ボールが出た地点でラインアウトになる。外からだと蹴った地点に戻されるから、陣地を稼げないんだ。"
