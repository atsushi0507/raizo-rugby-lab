# ラグビー用語辞書
# term: 用語名（テキスト内でマッチングされる文字列）
# description: ホバー時に表示される説明文

- term: "オフフィールドレビュー"
  description: "イエローカードかレッドカードかの判断を、プレーを止めずに裏側の専門官が精査する最新の仕組み。"

- term: "ノックフォワード"
  description: "プレーヤーがボールを落としボールが前方へ進むこと。2026年規則での正式名称（旧ノックオン）。"

- term: "ペナルティトライ"
  description: "相手の反則がなければ、おそらくトライが得られたであろうとレフリーが判断した場合に与えられる得点（7点）。"

- term: "ペナルティキック"
  description: "重大な反則に対して与えられる。ショット、タッチキック、スクラム、タップキックから再開を選択できる。"

- term: "スローフォワード"
  description: "ボールを相手側のデッドボールライン方向（前方）へ投げる、またはパスする反則。相手ボールのスクラムで再開。"

- term: "ドロップアウト"
  description: "自陣インゴールで抑えた後などに、22mラインまたはトライライン上からドロップキックで試合を再開する方法。"

- term: "アドバンテージ"
  description: "相手に反則があった際、プレーを止めずに継続した方が反則をしていない側に利益があるとレフリーが判断する仕組み。"

- term: "コンバージョン"
  description: "トライ後に与えられるゴールキック。成功すると2点が追加される。"

- term: "ラインアウト"
  description: "ボールがタッチに出た際、各チーム2名以上の選手が並び、投入されたボールを奪い合うセットピース。"

- term: "ドロップゴール"
  description: "プレー中にボールを一度地面にバウンドさせてからゴールポストの間を通すキック。成功すると3点。"

- term: "ジャッカル"
  description: "タックル直後、倒れた選手が持つボールを立ったまま奪い取るプレー。正式名称はジャッカラー/スティーラー。"

- term: "ターンオーバー"
  description: "プレー中に攻守が入れ替わること。ジャッカルやインターセプトによってボールを奪うことを指す。"

- term: "フリーキック"
  description: "軽い反則やマークに対して与えられる。ペナルティと異なり、直接ゴールを狙って得点することはできない。"

- term: "インゴール"
  description: "トライラインとデッドボールラインに囲まれた、得点となるエリア。トライライン自体もインゴールに含まれる。"

- term: "オフサイド"
  description: "プレーに参加できない位置にいる選手がプレーに関与する反則。状況によりオフサイドラインの基準は異なる。"

- term: "ハイタックル"
  description: "肩の線より上へ行う危険なタックル。選手の安全を守るため厳格に罰せられる。"

- term: "シンビン"
  description: "イエローカードを受けた選手が、10分間（7人制は2分間）一時的に退出させられること。"

- term: "スクラム"
  description: "軽い反則後の再開方法。両チームのFW8人（7人制は3人）が組み合い、投入されたボールを足で争奪する。"

- term: "50：22"
  description: "自陣から蹴ったボールが敵陣22m内でバウンドして外に出た場合、蹴った側のラインアウトで再開できるルール。"

- term: "マーク"
  description: "自陣22m区域内で相手のキックを直接キャッチし叫ぶことで、プレーを止めフリーキックを得る権利。フェアキャッチ。"

- term: "ラック"
  description: "地上にあるボールに対し、両チーム1名以上の選手が立ったまま身体を密着させて押し合う密集状態。"

- term: "モール"
  description: "ボールを保持した選手と両チームの選手が1名以上、立ったままバインド（結合）して押し合う密集状態。"

- term: "トライ"
  description: "相手インゴールで最初にボールをグラウンディング（接地）させること。5点が与えられる。"

- term: "タックル"
  description: "ボールキャリアーを捕まえ、地面に倒すこと。倒された選手はただちにボールを放さなければならない。"

- term: "TMO"
  description: "テレビジョン・マッチ・オフィシャルの略。映像を用いてトライの成否や不正なプレーをレフリーが確認する仕組み。"

# 追加
- term: "ノットリリースザボール"
  description: "タックルされた選手が、倒れたあとにボールを放さない反則。最も頻繁に起こるペナルティの一つ。"

- term: "ノットロールアウェイ"
  description: "タックルした選手が、倒れたあとにボール付近からどかず、相手のプレーを妨げる反則。"

- term: "コラプシング"
  description: "スクラムやモールを故意に崩す危険な行為。重大な反則（ペナルティ）となる。"

- term: "ゲインライン"
  description: "スクラムやラックが始まった地点を通る、横方向の仮想の線。ここを越えて前進することが攻撃の目標となる。"

- term: "フェーズ"
  description: "タックルが起きてから次の密集（ラック）を経て、再びボールが動く一連の継続した攻撃の数え方。"

- term: "ノーサイド"
  description: "試合終了のこと。試合が終われば敵味方なく、お互いの健闘を称え合うラグビーの精神を象徴する言葉。"

- term: "HIA"
  description: "脳振盪（のうしんとう）の疑いがある選手に対し、プレー続行が可能かビデオや医師が診断するプロセス。一時的な交代が行われる。"

- term: "ユーズイット"
  description: "密集でボールが動かなくなった際、レフリーが「ボールを出せ」と促す合図。その後5秒以内に出さないと反則になる。"

- term: "ダイレクトタッチ"
  description: "自陣22mエリア外から蹴ったボールが、バウンドせずに直接タッチラインの外に出ること。蹴った地点まで戻されて再開となる。"

- term: "スローインの不正"
  description: "ラインアウトでボールを真っ直ぐ投げ入れない反則。2026年規則での正式名称（旧ノットストレート）。"

- term: "ノットストレート"
  description: "ラインアウトでボールを真っ直ぐ投げ入れない反則。2026年規則で正式名称が'スローインの不正'に変更された。"

- term: "ターンオーバー"
  description: "プレー中に攻守が入れ替わること。ジャッカルやインターセプトによってボールを奪うことを指す。"