techniqueBreakdown:
  overview:
    title: "ゴールチャージは予測で止める"
    body: "ゴールチャージは足が速いだけでは成功しない。早く動けばオフサイド、遅れれば届かない。必要なのはキッカーの準備から成功を予測する洞察力だ。ヴァイレアは助走距離やボールの置き方を観察し、『届く』と判断したからこそ勝負に出られた。"
    image: "https://res.cloudinary.com/ddbfkxo9j/image/upload/v1780483956/2_a88ocj.png"

  sections:
    - title: "① 円陣に入らない"
      body: "コンバージョンキック前、多くの選手は円陣を組み次のプレーへ備える。しかしヴァイレアは違った。まずゴールチャージの可能性を探り、準備を優先した。チャージはキック前から始まっている。"

    - title: "② キッカーを観察する"
      body: "見るべきはボールではない。助走の長さ、ボールの角度、踏み込み位置。ヴァイレアはそれらの情報から、自分の走力で届くかを瞬時に計算していた。"

    - title: "③ 動き出しを合わせる"
      body: "ゴールチャージ最大の難しさはタイミングにある。早ければ反則、遅ければ届かない。キッカーの動き出しと同時に加速し、トップスピードで踏み切ることで初めてチャージの可能性が生まれる。"

    - title: "④ 最後は信じて飛び切る"
      body: "届くと判断しても、最後は思い切りが必要だ。ヴァイレアは迷わず高く跳び、腕を最大限に伸ばした。その数センチがコンバージョンを阻止し、結果的に試合を左右する2点を消した。"

watchPoints:
  - "ヴァイレアが円陣に加わらずチャージ準備をしている点"
  - "キッカーではなく助走やボールの置き方を観察している点"
  - "オフサイドにならない絶妙なスタートタイミング"
  - "トップスピードで加速している走り出し"
  - "最後に高く跳び切る覚悟と身体能力"
  - "ゴールチャージは予測と準備で成立していること"