storyContext:
  title: "なぜこのプレーが話題になったのか"
  body: >
    前年のプレーオフ準決勝。
    スピアーズはワイルドナイツを破り決勝へ進出した。

    そして今季リーグ戦では、
    試合終了のホーン後にワイルドナイツが逆転勝利。

    因縁を抱えた両チームが、
    再びプレーオフ準決勝で激突した。

    チケットは完売。

    キックオフ前から秩父宮は超満員となり、
    今季屈指の熱気に包まれていた。

    そんな大舞台で生まれたのが、
    ハラトア・ヴァイレアのゴールチャージだった。

    最終スコアは26-24。

    終了後、多くのファンが
    「あの2点が勝負を分けた」
    と語るプレーになった。

