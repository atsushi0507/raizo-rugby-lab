  - "パスと同時にスタートすることで生まれる加速"
  - "距離ではなくタイミングでプレッシャーを作っている点"
  - "チャージ後も減速せずにプレーを継続している意識"
  - "転がるボールの方向を即座に判断して追い切る判断力"

