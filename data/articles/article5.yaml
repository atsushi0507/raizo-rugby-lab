introduction: "なぜそのキックは、蹴る前から止められていたのか？"

conversations:
  - speaker: "リッチーくん"
    message: "え、これ余裕で蹴れる場面じゃない？"
  - speaker: "ライゾウ"
    message: "いや、もう間に合わない。"
  - speaker: "リッチーくん"
    message: "でもまだ距離あるよ？"
  - speaker: "ライゾウ"
    message: "距離じゃない。“タイミング”だ。"
  - speaker: "リッチーくん"
    message: "タイミング？"
  - speaker: "ソラ"
    message: "陣形や位置からキックを蹴ることは読めていたからね。チャージを狙って構えていたんだ。"
  - speaker: "リッチーくん"
    message: "え、もう動いてる！？"
  - speaker: "ライゾウ"
    message: "パスと同時にスタートしている。"
  - speaker: "リッチーくん"
    message: "だから一気に詰まるのか！"
  - speaker: "ライゾウ"
    message: "準備している側が、主導権を握る。"
  - speaker: "ライゾウ"
    message: "そのチャージは、偶然じゃない。"

structure:
  situation: "前半キックオフ直後、ブルーレヴズのキックを東芝ブレイブルーパスがキャッチ。ボールはリーチマイケルに渡り、すぐに接点が形成される。ラックからボールが出ると、SHは自陣ゴールライン5m付近で待つフルバックへ展開。タッチラインへの脱出キックが選択される場面だった。"
  situationImage: "https://res.cloudinary.com/ddbfkxo9j/video/upload/so_9/v1778080051/20260502_lek457.jpg"

  decision: "サングスターはラックには参加せず、左側3m付近でオフサイドラインぎりぎりにポジショニング。SHからFBへのパスを見て、キックを予測しながら準備していた。そしてパスと同時にスタート。約8mあった距離を一気に詰め、キック直前にチャージへと持ち込む。プレッシャーは距離ではなく、準備とタイミングで生まれていた。"
  decisionImage: "https://res.cloudinary.com/ddbfkxo9j/video/upload/so_13/v1778080051/20260502_lek457.jpg"

  result: "チャージされたボールはそのままゴールライン方向へ転がる。サングスターは減速せずに追い続け、最後のバウンドで伸びたボールに追いつきグラウンディング。キックオフからわずか20秒でトライを奪うビッグプレーとなった。"
  resultImage: "https://res.cloudinary.com/ddbfkxo9j/video/upload/so_18/v1778080051/20260502_lek457.jpg"

watchPoints:
