structure:

  situation: "前半30分45秒、静岡ブルーレヴズは敵陣22mライン内でラインアウトを獲得。モールが予想される状況で、ワイルドナイツはジャンプを競らずモール対策を選択する。予想通りにモールが形成！しかしレヴズは着地と同時に素早くモールを形成。初期配置で7対4という大きな数的優位を作り出していた。"

  situationImage: "https://res.cloudinary.com/ddbfkxo9j/video/upload/so_5/v1776782662/p2_kcsymp.jpg"

  decision: "レヴズは“速さ”を選択した。ラインアウトから即座にモールを形成し、相手が参加する前に数的優位を確立。さらにスロワーであるフッカーも素早くモールに加わり、優位を維持する構造を完成させた。これは単なるパワー勝負ではなく、事前に設計されたアタックである。"

  decisionImage: "https://res.cloudinary.com/ddbfkxo9j/video/upload/so_10/v1776782662/p2_kcsymp.jpg"

  result: "遅れてディフェンスがモールに参加するも圧力に耐えきれず前線が弾き出され、モールは分断。勢いを失わないまま前進したレヴズのモールはそのままトライラインまで到達。最後尾でボールをコントロールしていたフッカーが押し切ってトライを決めた。"

  resultImage: "https://res.cloudinary.com/ddbfkxo9j/video/upload/so_15/v1776782662/p2_kcsymp.jpg"

