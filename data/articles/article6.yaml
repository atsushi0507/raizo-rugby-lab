techniqueBreakdown:
  overview:
    title: "スティールは力ではなく姿勢で奪う"
    body: "スティールで重要なのは、相手を押し返すことではない。倒れず、自立した姿勢を維持しながらボールを固定することだ。今回のプレーでは、129kgの突進を真正面から受けず、斜めから勢いを逃がしながらタックル。そしてベン・ガンターは倒れずに立ち続け、ボールを固定し切った。"
    image: "https://res.cloudinary.com/ddbfkxo9j/image/upload/v1779461056/2_pjuudl.png"

  sections:
    - title: "① 正面から受けない"
      body: "大きなランナーを真正面で止めようとすると、体勢ごと押し込まれる。ワイルドナイツは2人で役割を分担し、勢いを横へ逃がす形でタックル。まず止めるではなく、崩すことを優先している。"

    - title: "② 倒れない"
      body: "ガンターはタックル後も両足で立ち続けている。スティール成立には自立が必須条件。膝や手をつかず、重心を落として耐え切ることで、ボールへアクセスできる姿勢を維持している。"

    - title: "③ ボールだけを固定する"
      body: "重要なのは相手を持ち上げることではなく、ボールを動かさないこと。ガンターは両腕でしっかりとボールを固定し、SHが救出に来る前に使えない状態を完成させている。"

    - title: "④ 必要なのは全身"
      body: "スティールは腕力だけでは成立しない。踏ん張る下半身、潰されない体幹、固定する背中と腕。さらに頭を下げない首の強さまで必要になる。接点で立ち続けるには、全身の連動が求められる。"

watchPoints:
  - "タックル時に真正面ではなく斜めから勢いを逃がしている点"
  - "ガンターが倒れず両足で立ち続けている姿勢"
  - "ボールだけを固定している腕の使い方"
  - "SHが到着する前に勝負を終わらせている時間感覚"
  - "スティールは腕力ではなく全身で成立していること"
  - "立ち続けること自体が高度な技術である点"
