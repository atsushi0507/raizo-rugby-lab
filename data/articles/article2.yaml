introduction: "なぜあの瞬間、迷わずキックを選べたのか？"

conversations:
  - speaker: "リッチーくん"
    message: "え、今のなんでキック！？普通に回してもいけそうじゃなかった？"
  - speaker: "ライゾウ"
    message: "無理だね。回すより速く、確実に仕留める方法があった。"
  - speaker: "リッチーくん"
    message: "え、そんなに差あった？"
  - speaker: "ライゾウ"
    message: "スクラムが崩れた時点で、ディフェンスは内側に集まってる。"
  - speaker: "リッチーくん"
    message: "あ、外が空くってこと？"
  - speaker: "ライゾウ"
    message: "そう。ただし“場所”じゃない。“時間”だ。"
  - speaker: "リッチーくん"
    message: "時間？"
  - speaker: "ライゾウ"
    message: "誰もカバーに行けない一瞬の空白。その間にボールを運べばいい。"
  - speaker: "リッチーくん"
    message: "なるほど…でもなんでキック？パスじゃダメ？"
  - speaker: "ライゾウ"
    message: "雨だ。ボールは滑る。パスはリスクが高い。"
  - speaker: "ライゾウ"
    message: "だから低く浮かせて、1バウンドで味方に届ける。"
  - speaker: "リッチーくん"
    message: "あのチップキックか！"
  - speaker: "ライゾウ"
    message: "そしてもう一つ。外には“準備できている選手”がいた。"
  - speaker: "リッチーくん"
    message: "あ、14番！？最初から走ってたよね！"
  - speaker: "ライゾウ"
    message: "待っていたんじゃない。来ると分かっていた。"
  - speaker: "ライゾウ"
    message: "全員の判断が揃ったから成立したトライだ。"

structure:
  situation: "敵陣22m付近、左タッチラインから10〜15mの位置でのスクラム。ヒートホンダが押し込み、サンゴリアス側にコラプシングが発生。スクラムは左方向に崩れ、ディフェンスは内側に圧縮される形となる。外側には大きなスペースが生まれていた。"
  situationImage: "https://res.cloudinary.com/ddbfkxo9j/video/upload/so_5/v1775910501/%E3%81%AA%E3%81%9CSO%E3%81%AF_%E8%BF%B7%E3%82%8F%E3%81%9A%E8%B9%B4%E3%82%8C%E3%81%9F%E3%81%AE%E3%81%8B_esao1i.jpg"

  decision: "SOはパスを受ける直前に右奥のスペースを確認。受けて着地と同時に、低く浮かせるチップキックを選択。雨で滑る状況を考慮し、転がしすぎず1バウンドで味方に届く精度を選んだ。"
  decisionImage: "https://res.cloudinary.com/ddbfkxo9j/video/upload/so_10/v1775910501/%E3%81%AA%E3%81%9CSO%E3%81%AF_%E8%BF%B7%E3%82%8F%E3%81%9A%E8%B9%B4%E3%82%8C%E3%81%9F%E3%81%AE%E3%81%8B_esao1i.jpg"

  result: "ボールは安定したバウンドでトライゾーン手前に入り、外から走り込んだWTBがキャッチ。ディフェンスが迫る中でも冷静に押さえ、そのままトライ。プレッシャーと悪天候を乗り越えた決定的な得点となった。"
  resultImage: "https://res.cloudinary.com/ddbfkxo9j/video/upload/so_16/v1775910501/%E3%81%AA%E3%81%9CSO%E3%81%AF_%E8%BF%B7%E3%82%8F%E3%81%9A%E8%B9%B4%E3%82%8C%E3%81%9F%E3%81%AE%E3%81%8B_esao1i.jpg"

watchPoints:
  - "スクラム崩壊によってディフェンスが内側に圧縮される構造"
  - "“スペース”ではなく“カバーが間に合わない時間”を見ている点"
  - "SOがキャッチ前にスペースを認知し、即キックに移行している判断速度"
  - "雨の中でパスではなくチップキックを選択したリスク管理"
  - "WTBがスペースの発生とキックを予測し、外で準備しているポジショニング"
  - "キャッチ時にディフェンスが迫る中でも確実に処理している技術"

