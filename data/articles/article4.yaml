  decision: "フルバックはキャッチ後すぐに前進しながら状況を確認。見ていたのはスペースではなく、相手が戻りきれていない“時間”。この一瞬を逃さず、タッチライン際へ正確なロングキックを選択する。ギリギリでバウンドさせることでダイレクトタッチを回避しつつ、大きく陣地を回復する判断だった。"
  decisionImage: "https://res.cloudinary.com/ddbfkxo9j/video/upload/so_16/v1777435705/2026.04.24_Fri_%E6%B5%A6%E5%AE%89D-Rocks_vs_%E9%9D%99%E5%B2%A1%E3%83%96%E3%83%AB%E3%83%BC%E3%83%AC%E3%83%B4%E3%82%BA_%E7%A7%A9%E7%88%B6%E5%AE%AE%E3%83%A9%E3%82%B0%E3%83%93%E3%83%BC%E5%A0%B4_guhets.jpg"

  result: "ボールは敵陣22mラインを越えてライン際に落ち、50:22が成立。一気に敵陣深くへ侵入するビッグプレーとなった。ラインアウトは確保できなかったものの、自陣から一瞬で流れを変える可能性を生んだプレーとなった。"
  resultImage: "https://res.cloudinary.com/ddbfkxo9j/video/upload/so_22/v1777435705/2026.04.24_Fri_%E6%B5%A6%E5%AE%89D-Rocks_vs_%E9%9D%99%E5%B2%A1%E3%83%96%E3%83%AB%E3%83%BC%E3%83%AC%E3%83%B4%E3%82%BA_%E7%A7%A9%E7%88%B6%E5%AE%AE%E3%83%A9%E3%82%B0%E3%83%93%E3%83%BC%E5%A0%B4_guhets.jpg"

