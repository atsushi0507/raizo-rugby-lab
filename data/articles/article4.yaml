structure:
  situation: "前半35分、浦安D-Rocksは0-28と大きくビハインド。敵陣22m手前でのスクラムは押し込まれ、静岡ブルーレヴズが外へ展開しキック。自陣22m付近でフルバックがボールをキャッチする。相手の最前線はまだセンターライン内側の10m付近に位置しており、守備は完全には整っていない状況だった。"
