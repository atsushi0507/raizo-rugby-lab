id: "fb15"
number: 15
name: "フルバック"
nameEn: "Fullback"
category: "バックス"
nickname: "The Night-Watcher"
catch: "最後尾から全てを見通す孤高の守護神"

# 主な役割
roles:
  - "チームの最後尾（最後の一線）に立ち、突破してきた相手を仕留める「最後の砦」"
  - "相手のキックを確実に処理し、正確なキックで陣地を押し戻す「エリアマネジメント」の要"
  - "守備から攻撃への切り替え（カウンター）の起点となり、自らもライン参加して得点を狙う「逆襲の狙撃手」"

watchPoints:
  - text: "キックに対するポジショニング"
    timing: "相手がキックを蹴ろうとした瞬間"
    detail: "落下地点を予測し、ボールが地面に着く前に余裕を持って移動できているかを見ている"
  - text: "マーク（フェアキャッチ）の判断"
    timing: "自陣22m内でキックを直接捕る瞬間"
    detail: "すぐに「マーク！」と宣言し、相手のプレッシャーを回避して自チームのFKにできているかを見ている"
  - text: "50:22（フィフティー・トゥウェンティー・トゥ）の狙い"
    timing: "自陣からタッチへキックを蹴る時"
    detail: "相手陣の22m内でバウンドさせて外へ出し、マイボールラインアウトを獲得できているかを見ている"

decision:
  - condition: "自陣深くで強いプレッシャーを受けている"
    action: "確実な直接キャッチと『マーク』の宣言"
    reason: "一度プレーを止め、落ち着いてフリーキックで陣地を挽回するため"
  - condition: "相手のバックス陣が前がかりになっている"
    action: "スペースを突く『50:22』キック"
    reason: "一撃で敵陣深くへ攻め込み、攻撃のチャンス（マイボールラインアウト）を作るため"
  - condition: "相手のキックが中途半端な位置に落ちた"
    action: "自らボールを持ってのカウンターアタック"
    reason: "相手の陣形が整う前に、スピードを活かして一気にゲインラインを突破するため"

decisionConversation:
  - speaker: "リッチーくん"
    message: "あ！相手がボールを蹴ったよ！……えっ、いつの間にかゲンくんがボールの下にいる！"
  - speaker: "ゲン"
    message: "……予測の範囲内だ。そこは、通さない。"
  - speaker: "リッチーくん"
    message: "すごい！捕った瞬間に『マーク！』って叫んだら、相手が止まったよ！魔法みたい！"
  - speaker: "ゲン"
    message: "自陣22mの中で直接捕れば、マークを宣言できる。プレーが止まり、フリーキックで仕切り直せる。……覚えておけ。"
  - speaker: "リッチーくん"
    message: "あっ、今度は自分で蹴った！しかもめちゃくちゃ遠くまで飛んでる……あれ、相手の22mの中でバウンドして外に出たよ？"
  - speaker: "ライゾウ"
    message: "50:22だ。自陣から蹴ったキックが相手の22m内でバウンドしてタッチを割ると、蹴った側のマイボールラインアウトになる。一発で攻守が逆転する、フルバックの必殺技だよ。"
  - speaker: "リッチーくん"
    message: "えー！キック一本でそんなことできるの！？……あっ、今度は相手が一人で走ってきた！味方は誰もいないのに、ゲンくん一人で止めに行ってる！"
  - speaker: "ゲン"
    message: "……最後の一線は、俺が守る。ここを抜かれたら、その先はゴールラインだ。"
  - speaker: "ライゾウ"
    message: "フルバックは最後の砦だ。彼の後ろには誰もいない。だからこそ、一対一のタックルを絶対に外さない技術と覚悟が求められる。彼が後ろで構えているから、僕たちは安心して前だけを見て戦える。あらゆるプレーが一度彼に集まり、そこから新しい攻撃が始まる。彼こそがこのチームの『元（はじまり）』なんだよ。"

scenes:
  - "最後尾で相手のロングキックを待ち構え、無駄のない動きで確実にキャッチする場面"
  - "ディフェンスラインを突破してきた相手に対し、一対一のタックルで仕留める瞬間"
  - "自陣22m区域内でキックを直接捕り、冷静に『マーク！』を宣言して危機を脱する場面"
  - "相手の守備の隙を見抜き、超長距離のキックで『50:22』を成功させる劇的なシーン"

relations:
  - number: 10
    name: "スタンドオフ"
    role: "背後の監視者"
    description: "ライゾウが攻撃のタクトを振る間、背後のスペースを管理し、戦略に集中させる信頼の目"
  - number: 14
    name: "ウィング"
    role: "バックスリーの司令塔"
    description: "共に広大なエリアをカバーし、守備範囲を指示する連携の要"
  - number: 4
    name: "左ロック"
    role: "制空権の共有者"
    description: "前線の空（ソラ）と、後方の空（ゲン）。チームの「高い視点」を共有するプロ同士の絆"

skills:
  - name: "フェアキャッチ（マーク）"
    description: "自陣22m区域内でキックを直接捕り、叫ぶことでプレーを止める技術"
  - name: "ロング・パント"
    description: "滞空時間の長いキックを蹴り、味方が走る時間とエリアを稼ぐ技術"
  - name: "キックカウンター"
    description: "捕球した瞬間に相手の隙を見抜き、猛スピードで逆襲に転じる走力"

commonMistakes:
  - "自陣22mより前で直接タッチに出してしまう（反則：ダイレクトタッチにより地域獲得失敗）"
  - "最後尾でのタックルミス（即トライに繋がる致命的なミス）"
  - "空中にあるボールを競り合う際、相手を掴んでしまう（危険なプレー）"

levelGuide:
  beginner: "最後尾で一人だけ違う動き（キックに備えた移動）をしているかを見る"
  intermediate: "マークを宣言するタイミングや、キックでどれだけ陣地を挽回したかを見る"

cta: "最後の一線を守り抜き、静かに逆襲の火を灯すゲン。その眼力に震えろ！"
icon: "/positions/fb_15_icon.png"
character: "/positions/fb_15_character.png"

# キャラクター設定
characterName: "ゲン（元）"
personality: "寡黙でストイック、責任感の塊。フクロウのような鋭い眼力で最後尾から全てを監視し、敵のミスを逃さず仕留める\"孤高の監視者\"。"
nameOrigin: "あらゆるプレーの行き着く先であり、そこからキックやカウンターで次の攻撃が始まる場所。攻守の流れが交差するチームの「根本」であり「始まり」であることから。"
catchphrase: "……そこは、通さない。/ ここで終わる。…そして、ここから始まる。"

createdAt: "2026-04-28"
updatedAt: "2026-04-28"
isFeatured: true