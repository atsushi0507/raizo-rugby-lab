nameEn: "Wing (Open Side)"
category: "バックス"
nickname: "Hunter"
catch: "軌道を見つけて仕留めるフィニッシャー"

watchPoints:
  - text: "内側のディフェンスのズレ"
    timing: "攻撃ライン形成時"
    detail: "1人でも遅れや外れがあるかを見ている"
  - text: "ボールの展開スピード"
    timing: "パスが回っている最中"
    detail: "自分に回ってくるまでの時間と角度を計算している"
  - text: "自分の前のスペース（軌道）"
    timing: "ボールを受ける直前"
    detail: "どのコースを走れば止まらず抜けられるかを見ている"

decision:
  - condition: "外にスペースがある"
    action: "加速して走り切る"
    reason: "トップスピードでディフェンスに捕まらずトライできるため"
  - condition: "内側にズレがある"
    action: "内に切り込む"
    reason: "ディフェンスのギャップを最短距離で突破できるため"
  - condition: "前が塞がれている"
    action: "外に流れる / サポートに回る"
    reason: "無理に仕掛けず次のチャンスに備えるため"

decisionConversation:
  - speaker: "リッチーくん"
    message: "フウガって、ボールもらったらすぐ走るだけなの？"
  - speaker: "フウガ"
    message: "…違う。もらう前に決めてる。どこを走るかは、もう見えてる。"
  - speaker: "リッチーくん"
    message: "見えてるって、何が？"
  - speaker: "フウガ"
    message: "軌道。ディフェンスのズレで、一瞬だけ通るラインがある。そこを走るだけだ。"
  - speaker: "リッチーくん"
    message: "じゃあ迷ったりはしないの？"
  - speaker: "フウガ"
    message: "迷ったら終わりだ。見つけた瞬間に、全部出す。"
  - speaker: "ライゾウ"
    message: "オープンサイドウィングは“最後に走る役”じゃない。外で待ちながら、内側で生まれたズレを見続けている。だから一瞬のチャンスを逃さず、最短の軌道で仕留められるんだ。WTB、準備で勝つポジションだ。"

scenes:
  - "ラインの外で待ち続ける場面"
  - "ボールが一気に展開される瞬間"
  - "ディフェンスの隙間を抜けてトライに持ち込む場面"

commonMistakes:
