name: "ソウ（奏）"
nameEn: "Scrum Half"
category: "バックス"
nickname: "The Beat"
catch: "チームの鼓動を刻む最速の奏者"

watchPoints:
  - text: "密集への寄りスピード"
    timing: "味方が倒された瞬間"
    detail: "ボールがある場所に誰よりも早く現れ、次の「音（供給）」を鳴らす準備をしているかを見ている"
  - text: "パスの「リズム」と「緩急」"
    timing: "ラックからボールを出す時"
    detail: "すぐ出すのか、一呼吸置いて相手を焦らせるのか。そのテンポがディフェンスを揺さぶっているかを見ている"
  - text: "レフリーへの働きかけ"
    timing: "密集での争奪中"
    detail: "「ユーズイット」の指示をどう引き出し、自分たちのリズムで再開させるかを見ている"

decision:
  - condition: "BKラインが整い、テンポを上げたい"
    action: "最速のパス供給"
    reason: "相手の守備が整う前に、高速なリズムでボールを展開し隙を突くため"
  - condition: "相手が密集サイドに寄っている"
    action: "自らサイドを突く"
    reason: "小柄な体を活かした鋭いランで、相手の予想外の拍子を刻み攪乱するため"
  - condition: "ラックが停滞し、エリアを挽回したい"
    action: "ボックスキックを蹴る"
    reason: "密集のすぐ後ろへ高く蹴り上げ、空中での争奪という新たなリズムを作るため"

decisionConversation:
  - speaker: "リッチーくん"
    message: "ソウくん、さっきからずーっと喋りながら走り回ってるね！もしかして、落ち着きがないのかな…？"
  - speaker: "ソウ"
    message: "しっしっ、リッチーくん静かに！俺が黙ったらこのチームの『ビート』が止まっちゃうんだよ。ほら、次はあっち！遅い遅い！テンポ落ちてるって！"
  - speaker: "リッチーくん"
    message: "うわあ、口も速い！でも、ソウくんがボールに触った瞬間に、急に試合がノリノリになってきた気がするなあ！"
  - speaker: "ライゾウ"
    message: "それがSHの役割だ。ソウは現場で『今、どの速さで攻めるか』を奏でる心臓（ビート）だ。彼が刻むリズムに合わせて、僕がゲームを指揮する。彼がやんちゃに暴れ回るほど、相手は自分たちの拍子を崩して自滅していくんだ"

scenes:
  - "密集から電光石火のパスを放り出し、攻撃を加速させる場面"
  - "スクラムへボールを投入し、攻撃のスイッチを入れる瞬間"
  - "「ユーズイット！」のコールに合わせて、最高のタイミングでボールを供給する場面"

commonMistakes:
  - "ラックで5秒以内にボールを出さない（ユーズイット不履行）"
  - "スクラムへの投入がまっすぐではない（ノットストレート）"
  - "味方のFWを動かす指示が遅れ、リズムが停滞してしまう"

