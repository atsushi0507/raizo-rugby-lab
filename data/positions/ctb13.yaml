id: "ctb13"
number: 13
name: "アウトサイドセンター"
nameEn: "Outside Center"
category: "バックス"
nickname: "The Blade"
catch: "敵陣を切り裂き、守備を熱く統率する『魂の刃』"

# 主な役割
roles:
  - "バックスの守備の要としてラインの上げ下げを指示し、外側のスペースを死守する「ディフェンスの指揮官」"
  - "12番（ガイ）が作ったズレを逃さず、一瞬のキレでディフェンスラインを突破する「最速の貫通役」"
  - "攻撃の最終局面において、外側のウィング（フウガ）へチャンスを届けるラストパスの供給"

watchPoints:
  - text: "ディフェンスラインの統率"
    timing: "相手がボールを展開し始めた瞬間"
    detail: "周囲に声をかけ、自分たちが飛び出すのか、外へ流す（ドリフト）のかを熱く指示しているかを見ている"
  - text: "一瞬の加速（キレ）"
    timing: "パスを受ける直前"
    detail: "トップスピードでボールを受け、相手ディフェンスのわずかな『刃の通り道（隙間）』を射抜いているかを見ている"
  - text: "タックルの精度"
    timing: "一対一のコンタクト時"
    detail: "スピードのある相手に対し、逃さず鋭いタックルで攻撃の芽を摘んでいるかを見ている"

decision:
  - condition: "相手の展開が速く、外側がピンチになる"
    action: "誰よりも大きな声でラインの押し上げを指示"
    reason: "味方の迷いを消し、組織的な守備で相手を外側（タッチライン際）へ追い詰めるため"
  - condition: "内側のガイ（12番）が相手を引きつけた"
    action: "閃光のようなキレでの斜め走り（アングル）"
    reason: "相手が反応できない速度で隙間を通り抜け、一気にトライチャンスを作るため"
  - condition: "味方のミスでボールを奪われた"
    action: "真っ先に反転しての猛追バックチェック"
    reason: "たとえ抜かれても諦めない情熱を見せ、チームに逆襲の火を灯すため"

decisionConversation:
  - speaker: "リッチーくん"
    message: "……わあ、ジンくんの声、スタジアム中に響いてる！『上げろ！逃がすな！』って、すごい熱気だよ！"
  - speaker: "ジン"
    message: "守備は我慢じゃない、攻撃だ！俺が道を断つ。お前らは俺の背中を見てろ！"
  - speaker: "リッチーくん"
    message: "かっこいい……！あっ、相手がパスを回してきた！ジンくん、すごい勢いで前に飛び出してる！"
  - speaker: "ジン"
    message: "パスが出る前に詰める。相手に考える時間を与えたら負けだ。……今だ！"
  - speaker: "リッチーくん"
    message: "タックル決まった！チームのみんなが『よし！』って盛り上がってる！"
  - speaker: "ガイ"
    message: "……ジンが前で断ってくれるから、俺は安心して壁を壊しに行ける。あいつの声が聞こえると、体が勝手に動くんだ。"
  - speaker: "リッチーくん"
    message: "あっ、今度は攻撃だ！ガイくんが突っ込んで相手を引きつけた……その横をジンくんが一瞬で抜けていった！速い！"
  - speaker: "ジン"
    message: "ガイが壁を砕く。俺はその隙間を射抜く。……フウガ、外は空いてるぞ！"
  - speaker: "フウガ"
    message: "……見えてる。"
  - speaker: "ライゾウ"
    message: "ガイの『牙』が壁を砕き、ジンの『刃』がその隙間を切り裂く。そしてフウガが最後に走り抜ける。この連携が僕たちのバックスラインだ。だが何より、ジンの咆哮一つでディフェンスラインが最強の防壁に変わる。バックスの熱源は、まさに彼なんだ。"

scenes:
  - "ラインを熱く統率し、組織的なディフェンスで相手を完全に封じ込める場面"
  - "相手のパスを予測し、インターセプトから咆哮と共にゴールへ走り抜ける瞬間"
  - "タックルを決めた後、すぐさま起き上がって味方を力強く鼓舞するシーン"

relations:
  - number: 12
    name: "インサイドセンター"
    role: "魂のコンビ"
    description: "荒々しい野生のガイと、熱く理知的に統率する13番。最強のセンター陣として中盤を支配する"
  - number: 10
    name: "スタンドオフ"
    role: "最前線の代弁者"
    description: "ライゾウの戦略を現場のディフェンスラインで熱く体現する、最も頼りになる戦友"
  - number: 14
    name: "ウィング"
    role: "信頼の門番"
    description: "外側を守るフウガに安心感を与え、最高の形で勝負させるためのディフェンスリードを提供"

skills:
  - name: "ブリッツ・ディフェンス"
    description: "相手がパスを回す前に、熱い出足で一気に距離を詰め、判断の余裕を奪うアグレッシブな守備"
  - name: "ライン・コミュニケーション"
    description: "激しいプレー中でも枯れない声で、仲間に的確な指示を飛ばし続けるリーダーシップ"
  - name: "スライシング・ラン"
    description: "スマトラトラのような俊敏さで、相手のわずかな防御ミスを鋭く「スライス」して通り抜ける技術"

commonMistakes:
  - "指示に熱中するあまり、自分がオフサイドラインを越えてしまう"
  - "一人で飛び出しすぎて、内側にパスを通される穴を開けてしまう"
  - "感情が高ぶりすぎて、ハイタックル（首より上への接触）などの危険なプレーをしてしまう"

levelGuide:
  beginner: "彼がどれだけ声を出して周りを動かしているかを見る"
  intermediate: "ディフェンスの時、彼がどのタイミングで前に飛び出しているかを見る"

cta: "最速のキレと熱き咆哮！敵を断ち切る『魂の刃』を体感せよ！"
icon: "/positions/ctb_13_icon.png"
character: "/positions/ctb_13_character.png"

# キャラクター設定
characterName: "ジン"
personality: "熱き魂を持つフィールドの指揮官。常に大声で仲間を鼓舞し、スマトラトラ譲りの俊敏さでフィールドを縦横無尽に駆け巡る。クールなバックス陣の中で唯一、情熱を剥き出しにする\"熱きハンター\"。"
nameOrigin: >
  ディフェンスラインの最前で「前に出るか、流すか、仕留めるか」を一瞬で決断し、
  迷いなく相手の攻撃を断ち切り、同時に味方の迷いすらも断ち切るその姿から。
  判断と動きが完全に一体化し、まさに“速さそのものが意思になった存在”であることから命名。
catchphrase: "……守備は我慢じゃない、攻撃だ！俺が道を断つ。"

# ニックネーム：The Blade（ザ・ブレイド）の由来
nicknameOrigin: >
  鋭利な刃物のように敵の攻撃をスパッと断ち切り、
  味方には勝利への道を鮮やかに指し示す姿から。
  彼が熱く研ぎ澄まされるほど、チームのディフェンスは鉄壁の輝きを放つ。

