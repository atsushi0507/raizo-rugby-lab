id: "pr3"
number: 3
name: "プロップ（タイトヘッドプロップ）"
nameEn: "Tighthead Prop"
category: "フォワード"
nickname: "The Anchor"
catch: "スクラムを支える最強の錨（いかり）"

watchPoints:
  - text: "スクラムの安定感"
    timing: "「セット」で組み合った瞬間"
    detail: "相手の1番と2番の間に頭を入れ、相手の押しを完全に封じ込めているかを見ている"
  - text: "力強い突進（ボールキャリー）"
    timing: "密集から抜け出して走る時"
    detail: "象のような重量感で相手のディフェンスをなぎ倒し、前進する姿を見ている"
  - text: "仲間のリフト（持ち上げ）"
    timing: "ラインアウト時"
    detail: "ソラ（4番）などのジャンパーを、その怪力で高く安定して持ち上げているかを見ている"

decision:
  - condition: "スクラムで強烈な圧力を受ける"
    action: "地面を噛み締め、1ミリも引かない"
    reason: "自分が崩れればスクラム全体が崩壊するため、チームの『錨』として耐える"
  - condition: "ゴール前でボールを託される"
    action: "低く力強いピック・アンド・ゴー"
    reason: "圧倒的な体重とパワーを活かし、強引にでもトライラインを越えるため"
  - condition: "仲間がミスをして落ち込んでいる"
    action: "背中を叩いて大笑いする"
    reason: "フロントローの精神的支柱として、チームの士気を下げさせないため"

decisionConversation:
  - speaker: "リッチーくん"
    message: "ツヨシくん、スクラムですっごい顔してるよ！あんなに押されて痛くないの？"
  - speaker: "ツヨシ"
    message: "ガハハ！痛いっていうより、『もっと来いよ！』ってワクワクするぜ。俺が止まれば、みんなが安心できるだろ？"
  - speaker: "リッチーくん"
    message: "象さんみたいに強くて、でも笑うととっても優しいんだね！あっ、今度はボールを持って走ってる！"
  - speaker: "ツヨシ"
    message: "ピック・アンド・ゴーだ！ゴール前なら俺の出番。この体重で突っ込めば、そう簡単には止められねえぜ！"
  - speaker: "リッチーくん"
    message: "うわあ、3人がかりで止めようとしてるのに、まだ前に進んでる……！"
  - speaker: "ツヨシ"
    message: "ガハハ！もうちょい！……ダイチ、あとは頼んだ！"
  - speaker: "ライゾウ"
    message: "タイトヘッドプロップはスクラムの右側で相手2人分の圧力を受け止める、最も過酷なポジションだ。ツヨシがいるからダイチは安心してボールに集中できる。スクラムの『錨』であり、ゴール前では最強の『破城槌』でもある。彼の笑顔がチームの太陽なんだ。"

scenes:
  - "スクラムで相手を圧倒し、じりじりと押し込んでいく場面"
  - "強烈なタックルを受けても止まらず、相手を引きずりながら前進する場面"
  - "試合終了後、誰よりも早く相手チームを称えにいく場面"

relations:
  - number: 1
    name: "左プロップ"
    role: "フロントローの両翼"
    description: "共にダイチを支え、スクラムの最前線で戦う魂の兄弟"
  - number: 2
    name: "フッカー"
    role: "スクラムの核"
    description: "ダイチを挟んで一体となり、チームの土台を作る最高の相棒"
  - number: 5
    name: "右ロック"
    role: "直後の推進力"
    description: "自分の背中を強力に押し、パワーを増幅させてくれる信頼のパワーユニット"

skills:
  - name: "タイトヘッド・バインド"
    description: "相手の1番プロップを外側からガッチリと掴み、コントロールする技術"
  - name: "ピック・アンド・ゴー"
    description: "足元のボールを拾い、そのままの勢いで相手を押し倒して進む力技"
  - name: "フロントロー・パワー"
    description: "首、肩、足腰のすべてを連動させ、トン単位の圧力を一点に集中させる力"

roles:
  - "スクラムの右側（タイトヘッド）で相手の圧力を受け止め、押しを支える不動の柱"
  - "密集地帯（ラック付近）から巨体を活かして力強く突進し、敵陣を物理的にこじ開ける"
  - "ラインアウトにおいて、ソラ（4番）などのジャンパーを高く、安全にリフト（持ち上げ）する"

commonMistakes:
  - "耐えきれずに膝を地面についてしまう（反則：故意に倒れる/スクラムを崩す）"
  - "相手を自分の方へ引っ張り込んでしまう（反則：相手を引っ張る）"
  - "スクラムで頭が腰より低くなってしまう"

levelGuide:
  beginner: "スクラムが始まった時に、彼がまっすぐ耐えているかを見る"
  intermediate: "スクラムを押し勝った後、一番に立ち上がって次のプレーへ走っているかを見る"

cta: "チームの重しにして太陽！『アンカー』の圧倒的パワーを目撃せよ！"
icon: "/positions/pr_3_icon.png"
character: "/positions/pr_3_character.png"

# キャラクター設定
characterName: "ツヨシ（剛士）"
personality: "豪放磊落で常に笑顔を絶やさない、チームの太陽。スクラムという最も過酷な戦場の中心にいながら、受ける重圧を笑い飛ばして推進力に変える\"不屈のアンカー\"。"
nameOrigin: "どんな重圧にも屈しない「剛」健な肉体と、最前線で仲間を支えることに誇りを持つ武「士」のような在り方から。"
catchphrase: "ガハハ！最高に楽しいな、この重圧！"

createdAt: "2026-04-22"
updatedAt: "2026-04-22"
isFeatured: true