# キャラクター設定
characterName: "タケシ（武）"
personality: "無骨で献身的な、チームの誰もが頼る兄貴分。言葉よりも背中で語り、最も激しいコンタクトエリアに真っ先に飛び込む\"不退転の重戦車\"。"
nameOrigin: "「武＝戦う“人”」として、仲間のために身体を張り、前に立つ責任を背負い、一番キツい場所を自ら引き受けるという、人情と覚悟の在り方から。"
catchphrase: "……俺が道を作る。お前らは、止まらずについてこい。"

