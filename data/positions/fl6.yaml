id: "fl6"
number: 6
name: "フランカー（ブラインドサイド）"
nameEn: "Flanker / Blind-side Flanker"
category: "フォワード"
nickname: "The Juggernaut"
catch: "一番キツい場所を引き受け、背中で道を拓く守護獣"

watchPoints:
  - text: "ブラインドサイドの封鎖"
    timing: "スクラムからボールが出た瞬間"
    detail: "死角となる狭い側を狙う相手の8番や9番に対し、一歩も引かずに正面から仕留めているかを見る"
  - text: "密集（ラック）への献身"
    timing: "味方が倒された直後"
    detail: "誰よりも早くポイントに到達し、巨大な体で相手を排除（クリーンアウト）してボールを死守しているかを見る"
  - text: "コンタクトの強度"
    timing: "自らのキャリー時"
    detail: "相手の分厚いディフェンスに対し、力強い突進でゲインラインを割り、仲間に勢いを与えているかを見る"

decision:
  - condition: "相手が死角であるブラインドサイドを突いてきた"
    action: "正面からの刺さるタックルで完全封鎖"
    reason: "自らの責任エリアを死守し、相手に戦略的な隙を与えないため"
  - condition: "接点で味方が孤立し、ボールを奪われそうになる"
    action: "身を挺してポイントを制圧（スイープ）"
    reason: "仲間のミスをカバーし、一番キツい場所で身体を張って継続させるため"
  - condition: "攻撃が停滞し、力ずくの突破が必要な場面"
    action: "密集の核へのクラッシュ（突進）"
    reason: "自らが壁を砕く「重戦車」となり、チームに前進する覚悟を示すため"

decisionConversation:
  - speaker: "リッチーくん"
    message: "わあ！タケシくん、あんなに激しくぶつかってるのに、倒れてもすぐ起きてまた走ってる！"
  - speaker: "タケシ"
    message: "……ハァ……ハァ。……きついのは、みんな同じだ。ここを俺が止めなきゃ、後ろが困るからな。"
  - speaker: "リッチーくん"
    message: "あっ、相手が狭い方から攻めてきた！タケシくんが真正面に立ちはだかってる！"
  - speaker: "タケシ"
    message: "あの狭い側は俺の担当だ。一歩でも通したら、後ろのディフェンスが崩れる。……だから、通さない。"
  - speaker: "リッチーくん"
    message: "すごい……！タケシくんがラックで相手をどかしてくれるから、ソウくんが安心してボールを出せてるんだね！"
  - speaker: "タケシ"
    message: "ラックは早く制圧するほど、次の攻撃が速くなる。俺の仕事はそこを片付けることだ。"
  - speaker: "ロウガ"
    message: "アイツがブラインドサイドを完璧に塞いでくれるから、俺はオープンサイドに集中できる。"
  - speaker: "ロウガ"
    message: "……言葉はいらねぇ、あの背中を見りゃ十分だ。"
  - speaker: "リッチーくん"
    message: "タケシくんって、目立つプレーは少ないけど、いなくなったらチームが困りそう…！"
  - speaker: "ライゾウ"
    message: "その通りだ。派手なトライの裏には、必ず彼の泥臭い献身がある。一番キツい場所を引き受け、密集を制圧し、ブラインドサイドを封じる。そういう選手がいるから、チーム全体が自分の仕事に集中できるんだ。"

scenes:
  - "スクラム横の狭いスペースを突こうとする相手を、岩のようなタックルで跳ね返す場面"
  - "味方のキャリアが倒れた瞬間、真っ先に飛び込んで相手のジャッカルを粉砕するクリーンアウト"
  - "ゴール前の混戦から、数人のディフェンスを引きずりながら強引に押し切るトライシーン"

commonMistakes:
  - "密集で熱くなりすぎて、ゲート（後方）以外から参加してしまう"
  - "タックル時に頭が下がってしまい、危険な形になる"
  - "ボールを守る際に倒れ込んでしまい、相手の争奪を妨げる（シーリング）"

relations:
