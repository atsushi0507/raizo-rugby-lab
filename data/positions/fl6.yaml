    role: "最前線の援護"
    description: "温かいハルと共に、密集戦において最も激しいコンタクトエリアを支え抜く"
  - number: 9
    name: "スクラムハーフ"
    role: "クリーンボールの提供"
    description: "ソウが最適なリズムで球出しできるよう、接点を完全に掃除して安全な「聖域」を作る"

skills:
  - name: "クリーンアウト"
    description: "ラックに突っ込んでくる相手を、正確なバインドとパワーで完全排除する技術"
  - name: "ブラインド・ディフェンス"
    description: "スクラムやモールからブラインドサイドを狙う相手の動きを瞬時に遮断するポジショニング"
  - name: "プロテクト・キャリー"
    description: "密集地帯を突進する際、相手にボールを晒さず、確実に前進し続けるフィジカル能力"

roles:
  - "ブラインドサイドの守備封鎖と死守"
  - "密集戦（ブレイクダウン）におけるボールの確保と保護"
  - "フィジカルを活かした突破による攻撃の起点作り"

levelGuide:
  beginner: "密集が起きた時、誰よりも早く味方を助けにいく選手を見る"
  intermediate: "スクラムの狭い側を守る初動の速さとタックルの強度を見る"

cta: "なぜ6番の背中を見ると、チームは勇気づけられるのか？"
