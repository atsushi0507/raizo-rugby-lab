id: "pr1"
number: 1
name: "左プロップ"
nameEn: "Loosehead Prop"
category: "フォワード"
nickname: "The Bastion" # ザ・バスティオン（守護する砦）
catch: "仲間を優しく包み、道を拓く陽光の守護獣"

# 主な役割
roles:
  - "スクラムの左側（ルースヘッド）で、相手の3番プロップをコントロールし、味方が押しやすい状況を作る「スクラムの舵取り」"
  - "密集戦（ブレイクダウン）において、倒れた味方に寄り添い、相手の妨害からボールを優しく、かつ強固に守り抜く「聖域の形成」"
  - "ラインアウトで、仲間のジャンパーを大きな体と確かな力で高く、安全にリフトする「信頼の土台」"

watchPoints:
  - text: "相手3番への懐の深い押し"
    timing: "スクラムが組み合った瞬間"
    detail: "力任せに押すのではなく、ルースヘッド特有の自由な動きを活かし、相手の力を受け流しながら有利な形を作っているかを見ている"
  - text: "倒れた仲間を守る動き"
    timing: "味方がタックルされた直後"
    detail: "誰よりも早く駆け寄り、覆いかぶさるようにして（シーリングにならぬよう規律を守りつつ）相手のジャッカルを防いでいるかを見ている"
  - text: "朗らかな鼓舞"
    timing: "試合の苦しい局面"
    detail: "険しい表情になりがちなFW陣の中で、笑顔を絶やさず仲間の肩を叩いて安心させているかを見ている"

decision:
  - condition: "味方の若手バックスが倒され、ピンチになる"
    action: "「大丈夫だぞ」と声をかけながらポイントを制圧"
    reason: "技術的な防御だけでなく、精神的な安心感を与えることでチームの規律を保つため"
  - condition: "スクラムで相手の右プロップが強烈に押してくる"
    action: "柔軟なバインドで相手の芯を外す"
    reason: "真っ向からぶつかるツヨシとは対照的に、技術と柔軟さで相手の圧力を無力化し、スクラムを安定させるため"
  - condition: "トライが決まった瞬間"
    action: "誰よりも先にトライした仲間を抱きしめる"
    reason: "喜びを共有し、チームの「結束（Solidarity）」を最大限に高めるため"

decisionConversation:
  - speaker: "リッチーくん"
    message: "ハルくん、あんなに激しくぶつかってるのに、どうしていつもニコニコしてるの？"
  - speaker: "ハル"
    message: "あはは、痛いのはお互い様だからね。でも僕が笑っていれば、倒れた仲間も安心して立ち上がれるだろ？"
  - speaker: "リッチーくん"
    message: "本当だ、ハルくんがそばに来ると、なんだかポカポカして怖くないや！"
  - speaker: "ダイチ"
    message: "彼の朗らかさは、泥臭い仕事ばかりのフロントローにおける救いだ。ツヨシが火を灯し、彼がその火を優しく守る。それが我々のスタイルだよ。"
  - speaker: "ライゾウ"
    message: "どんなに緻密な戦術を練っても、最後に選手を動かすのは『安心感』だ。彼の背中は、チームにとって最高の避難所であり、進撃の拠点なんだ。"

scenes:
  - "激しい密集の中で、笑顔を絶やさず相手のプレッシャーを跳ね除ける場面"
  - "ラインアウトでリフトしたソラが着地するまで、優しく支え続けるシーン"
  - "ノーサイドの笛が鳴った後、相手チームの選手を朗らかに称えに行く場面"

relations:
  - number: 2
    name: "フッカー"
    role: "慈愛のコンビ"
    description: "共にフロントローを支える、チームの『お父さん（ダイチ）』と『お兄さん（1番）』のような信頼関係"
  - number: 3
    name: "右プロップ"
    role: "陽の双璧"
    description: "豪快なツヨシと朗らかな1番。表現の仕方は違えど、フロントローを明るく照らす二人の太陽"
  - number: 12
    name: "インサイドセンター"
    role: "突撃後の守護"
    description: "牙威が壁をこじ開けた後、真っ先にサポートに入り、その道を確実なものにする連携"

skills:
  - name: "ソフト・アタック"
    description: "ルースヘッドとして相手のタイトヘッドの内側に優しく、かつ深くバインドし、コントロールする技術"
  - name: "ガーディアン・シール"
    description: "ラックにおいて、規律（オンフィート）を守りながら、巨大な体で味方とボールを完全に保護する壁の作り方"
  - name: "スマイル・リフト"
    description: "ジャンパーに「絶対に落とさない」という安心感を与え、最高打点まで真っ直ぐにリフトする技術"

commonMistakes:
  - "仲間を守るあまり、ボールの上に倒れ込んでしまう（反則：シーリング/オフフィート）"
  - "スクラムで相手を下に引きずり込んでしまう（反則：プルダウン）"
  - "密集への参加が遅れ、仲間を孤立させてしまう"

levelGuide:
  beginner: "密集が起きたとき、彼がどれだけ早く仲間の元へ駆けつけているかを見る"
  intermediate: "スクラムの際、左肩を外に出して相手のバランスをどう崩しているかを見る"

cta: "強くて、優しい。チームの『お兄さん』バスティオンが作る温かな要塞をその目で見よ！"
icon: "/positions/pr_1_icon.png"
character: "/positions/pr_1_character.png"

# キャラクター設定
characterName: "ハル（陽守）"
personality: "春の日だまりのように朗らかで、包容力に満ちたチームの『お兄さん』。スクラムでは柔軟な矛となって道を切り拓くが、一度密集を離れれば、誰よりも早く傷ついた仲間の元へ駆けつけ、その大きな体で優しく守り抜く\"陽光の要塞\"。"
nameOrigin: >
  激しい戦場に差し込む「陽」だまりのような温かさと、
  倒れた仲間を大きな体で包み込んで「守」り抜くという、
  フロントローとしての慈しみ深い在り方から。
catchphrase: 
  - "あはは！俺の背中に隠れてな。もう大丈夫だぞ！"
  - "さあ、道を開けるよ。みんな、僕にしっかりついておいで！"
  - "あはは、いい押しだね！でも、大好きな仲間のためなら、僕はどこまでも強くなれるんだ。"

createdAt: "2026-04-29"
updatedAt: "2026-04-29"
isFeatured: true