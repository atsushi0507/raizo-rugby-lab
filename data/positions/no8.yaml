name: "ナンバーエイト"
nameEn: "Number Eight"
category: "フォワード"
nickname: "The Sovereign" # ザ・サヴリン（君主・至高の存在）
catch: "フォワードの魂を束ね、全てを完遂する絶対的な王"

# 主な役割
roles:
  - "スクラム最後尾でボールをコントロールし、自ら持ち出すか9番へ展開するかを判断する「起点の選択者」"
  - "フォワードとバックスを繋ぐリンクマンとして、キャリー・パス・サポートの全てを高水準で担う「攻守の結節点」"
  - "フィールド全域をカバーし、要所でボールキャリーやタックルを行う「チーム最多仕事量のオールラウンダー」"

watchPoints:
  - text: "スクラム最後尾からの仕掛け"
    timing: "スクラムからボールが出る直前"
    detail: "足元のボールを自ら拾い上げて突進するか（エイト単）、スクラムハーフに委ねるかの判断を見ている"
  - text: "神出鬼没のディフェンス"
    timing: "相手が攻撃を展開するフェーズ中"
    detail: "どこからともなく現れ、決定的なタックルでピンチを救っているかを見ている"
  - text: "ラインアウトでの貢献"
    timing: "ラインアウトの瞬間"
    detail: "状況に応じてジャンパーとして参加したり、着地後のボール保護やサポートに素早く動いているかを見ている"

decision:
  - condition: "スクラムが優勢で相手の注意が9番に向いている"
    action: "自らボールを持ち出す『8単（エイトタン）』"
    reason: "ディフェンスを引きつけ、外側のスペースを生み出すため"
  - condition: "相手のキーマンが突破しようとしている"
    action: "正面からの決定的タックル"
    reason: "流れを断ち切り、チームを救うため"
  - condition: "攻撃が停滞しサポートが遅れている"
    action: "最速で接点に入りボールを保護"
    reason: "攻撃の継続を最優先するため"

decisionConversation:
  - speaker: "リッチーくん"
    message: "えっ！？エイトくん、さっきまでスクラムの一番後ろにいたのに、もうあんなところでタックルしてる！"
  - speaker: "エイト"
    message: "チームが必要としている場所に、いるだけだよ。それがナンバーエイトの仕事だから。"
  - speaker: "リッチーくん"
    message: "スクラムの後ろでボールを持ったまま、自分で走り出した！あれは何をしてるの？"
  - speaker: "エイト"
    message: "相手の目が9番に向いていたから、自分で仕掛けた。ディフェンスを引きつければ、外が空く。みんなが活きるための一手だよ。"
  - speaker: "リッチーくん"
    message: "すごい……。全部のプレーに関わってるみたいだ！疲れないの？"
  - speaker: "エイト"
    message: "疲れてないと言えば嘘になる。でも、俺が止まったらみんなが困る。それだけのことだよ。"
  - speaker: "リッチーくん"
    message: "あっ、ピンチだ！相手が突破しそう……！あ、エイトくんが止めた！どこから来たの！？"
  - speaker: "エイト"
    message: "ずっと見ていたから。あそこが危ないのは、少し前からわかっていた。"
  - speaker: "リッチーくん"
    message: "エイトくんって、なんか……みんなが安心して戦えてる気がする。"
  - speaker: "ライゾウ"
    message: "その通りだ。彼がいるだけで、チーム全体の動きが変わる。フォワードは力強く前に出られて、バックスは思い切って仕掛けられる。攻守の全てを高い水準でこなし、誰よりも走り、誰よりも体を張る。それがナンバーエイトという存在だ。"

scenes:
  - "スクラム最後尾からボールを持ち出し、そのままディフェンスを突破する場面"
  - "ラインアウトでジャンパーのサポートに入り、着地後すぐにボールを保護する場面"
  - "試合終盤、誰よりも早く走り込み決定的なタックルを決める瞬間"

