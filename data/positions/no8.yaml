cta: "すべてを繋ぎ、すべてを終わらせる。ナンバーエイトという完成形を目撃せよ！"
icon: "/positions/no8_8_icon.png"
character: "/positions/no8_8_character.png"

# キャラクター設定
characterName: "エイト（瑛人）"
personality: "慈愛と責任感を併せ持つチームの絶対的中心。常に全体を見渡し、最も厳しい仕事を自ら引き受ける覚悟を持つ\"至高の統率者\"。"

nameOrigin: >
  ナンバーエイトというポジションは、フォワードとバックスの境界に立ち、
  攻撃・守備・連携のすべてを担う“チームの中心点”である。
  その象徴として、ポジション名そのものを体現する「エイト」と名付けた。
  漢字の「瑛人」は、瑛＝内に強い輝きを持つ存在、人＝チームの中心となる人物を意味し、
  目立ちすぎずとも全体を支配するその役割を表している。

nicknameOrigin: >
  「The Sovereign（君主）」は、単に力が強い存在ではなく、
  チーム全体を統率し、すべての役割を一つに束ねる存在であることを意味する。
  フォワードの力、バックスのスピード、その両方を理解し、
  最終的な意思決定を下すナンバーエイトこそが、フィールドにおける“支配者”であるため。

catchphrase: "……全てを繋ぐのが俺の役目だ。最後は、俺が終わらせる。"

