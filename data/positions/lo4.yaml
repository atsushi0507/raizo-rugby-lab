id: "lo4"
number: 4
name: "左ロック"
nameEn: "Left Lock"
category: "フォワード"
nickname: "The Tower"
catch: "天空を支配する供給のスペシャリスト"

watchPoints:
  - text: "ラインアウトの最高到達点"
    timing: "ダイチ（2番）がボールを投げた瞬間"
    detail: "相手の妨害を越える圧倒的な高さでボールを確保できているかを見ている"
  - text: "空中でのボール処理"
    timing: "キャッチした直後"
    detail: "ソウ（9番）がパスしやすい位置へ、正確にボールを届けているかを見ている"
  - text: "スクラムの「押し」の伝達"
    timing: "セット後"
    detail: "1番プロップの真後ろから、パワーを逃さず前へ伝えているかを見ている"

decision:
  - condition: "ラインアウトで相手と競り合う"
    action: "最高打点でのキャッチ"
    reason: "高さを活かして相手の頭上からボールを奪い、確実に自ボールにするため"
  - condition: "味方のBKラインが準備できている"
    action: "空中でソウ（SH）へ即座にタップパス"
    reason: "着地の時間を省き、最速のテンポで攻撃を開始させるため"
  - condition: "キックオフのボールが飛んでくる"
    action: "周囲を制圧してのジャンピングキャッチ"
    reason: "相手にプレッシャーを与えつつ、自陣のエリアを確保するため"

decisionConversation:
  - speaker: "リッチーくん"
    message: "わあ、ソラくん、すごい高い！あんなところまで飛べるなんて、空を飛んでるみたいだね！"
  - speaker: "ソラ"
    message: "ふふ、空からの景色はいいよ。ダイチくんの投げるボールは、ここ（天空）で僕が責任を持って預かるからね。"
  - speaker: "リッチーくん"
    message: "ソラくんが捕ると、なんだか安心するなあ。でも、あんなに高いところで怖くないの？"
  - speaker: "ライゾウ"
    message: "それがロックの誇りだよ。ソラが制空権を握ってくれるから、僕たちは地上で戦略を練ることができる。彼が届けてくれるボールは、まさに僕たちの『攻撃の種』なんだ。"

scenes:
  - "ラインアウトで、リフトを活かして誰よりも高く跳び上がる場面"
  - "激しいスクラムで、1番プロップを力強く後ろから支える瞬間"
  - "キックオフのボールを空中で競り合いながら、ガッチリと確保する場面"

relations:
  - number: 2
    name: "フッカー（ダイチ）"
    role: "空中のホットライン"
    description: "彼が投げる正確なボールを、最高の場所でキャッチする信頼の相棒"
  - number: 5
    name: "右ロック"
    role: "二列目の相棒"
    description: "共にスクラムの核となり、フィールドを制圧する双璧"
  - number: 9
    name: "スクラムハーフ（ソウ）"
    role: "リズムの始動"
    description: "空中で確保したボールを、彼の刻むビート（リズム）へと繋ぐ"

skills:
  - name: "ジャンピング・キャッチ"
    description: "リフトを受けて空中で静止し、確実にボールを確保する技術"
  - name: "ラインアウト・サイン"
    description: "相手を惑わせ、自分たちが有利にボールを捕るための高度な戦術"
  - name: "スクラム・バインド"
    description: "プロップと密着し、自チームのパワーを最大限に伝える結合技術"

commonMistakes:
  - "空中で相手を掴んでしまう（反則：空中でのタックル）"
  - "ラインアウトでボールを真っ直ぐキャッチできない（スローインの不正に関連）"
  - "スクラムで頭が腰より低くなってしまう"

levelGuide:
  beginner: "ラインアウトでチームの誰よりも高く跳んでいるかを見る"
  intermediate: "キャッチした後に、ソウ（9番）へどう渡しているかを見る"

cta: "ラグビーの『空』を支配するタワー、その高さを体験せよ！"
icon: "/positions/lo_4_icon.png"
character: "/positions/lo_4_character.png"

# キャラクター設定
characterName: "ソラ（蒼空）"
personality: "泰然自若とした心優しき知性派。高い視点から戦況を冷静に俯瞰し、空中のボールを確実に支配する\"天空の監視者\"。"
nameOrigin: "誰の手も届かない高い「空」でボールを預かり、地上へ届ける役割。そして晴れ渡る「蒼空」のような澄んだ判断力から。"
catchphrase: "空からの景色はいいよ。ボールはここで預かるね。"

