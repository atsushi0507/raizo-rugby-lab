id: "lo5"
number: 5
name: "右ロック"
nameEn: "Right Lock"
category: "フォワード"
nickname: "The Engine"
catch: "スクラムを後ろから爆破する絶対的な動力源"

watchPoints:
  - text: "タイトヘッドプロップ（3番）との連結強度"
    timing: "スクラムが組み合う瞬間"
    detail: "最も重圧がかかる3番プロップの真後ろから、一寸の狂いもなくパワーを伝えているかを見ている"
  - text: "密集（ラック）の掃除（クリーンアウト）"
    timing: "ボールが止まりかけた瞬間"
    detail: "恐竜のような力強さで相手を排除し、味方がボールを出しやすくしているかを見ている"
  - text: "ラインアウトのリフトの安定感"
    timing: "ジャンパーが跳ぶ瞬間"
    detail: "左ロック（4番）などのジャンパーを、その太い腕でどれだけ高く安定させているかを見ている"

decision:
  - condition: "スクラムで相手を押し込みたい"
    action: "最大出力での一斉推進"
    reason: "後ろから爆発的な力を伝えることで、相手のフロントローを浮かせ、優位に立つため"
  - condition: "味方のボールがラックに捕まっている"
    action: "地響きを立ててのクラッシュ"
    reason: "自らが重戦車となって密集をこじ開け、攻撃のテンポ（リズム）を停滞させないため"
  - condition: "ラインアウトで空中戦を仕掛ける"
    action: "力強いリフトの継続"
    reason: "「天空の監視者」であるソラが空中で仕事に集中できるよう、絶対的な足場を提供するため"

decisionConversation:
  - speaker: "リッチーくん"
    message: "ゴウくん、すごい迫力……！立ってるだけで地面が震えてるみたいだよ！"
  - speaker: "ゴウ"
    message: "……フン。地響きを上げろ。俺が押し切る。"
  - speaker: "リッチーくん"
    message: "わあ！スクラムですっごい力！ゴウくんが押した瞬間、相手のスクラムが浮き上がったよ！"
  - speaker: "ツヨシ"
    message: "ガハハ！こいつが後ろにいてくれると、背中に巨大なロケットを積んでる気分になれるんだぜ。最高の相棒だ！"
  - speaker: "ライゾウ"
    message: "どんなに優れた戦略も、彼という強力な『エンジン』がなければ動き出さない。目立たずともチームを動かすその振動こそが、僕たちの勝利の鼓動なんだ。"

scenes:
  - "スクラムで相手を圧倒し、地響きを立てながらじりじりと押し込んでいく場面"
  - "密集地帯（ラック）に突っ込み、相手ディフェンスを力でなぎ倒す瞬間"
  - "ラインアウトで、長い手足のソラを軽々と高く持ち上げる場面"

relations:
  - number: 3
    name: "右プロップ"
    role: "直前の推進パートナー"
    description: "彼の真後ろからパワーを最大解放し、スクラムを完成させる"
  - number: 4
    name: "左ロック"
    role: "二列目の双璧"
    description: "「高さ」のソラと「強さ」のゴウとして、空中と地上の両面を支配する"
  - number: 2
    name: "フッカー"
    role: "セットプレーの土台"
    description: "ダイチを中心としたスクラムやラインアウトを、背後から全力で支える"

skills:
  - name: "タイトヘッド・ドライブ"
    description: "最も負荷のかかる3番の後ろから、真っ直ぐに全パワーを伝える技術"
  - name: "クリーンアウト"
    description: "ラックにいる相手を力ずくで排除し、ボールを「掃除」する破壊的な動き"
  - name: "パワフル・リフト"
    description: "重量級の体躯を活かし、ジャンパーを空中に固定し続ける安定した持ち上げ技術"
  
roles:
  - "スクラムの右側（タイトヘッド側）で3番プロップを強力に押し、スクラムを安定・前進させる「エンジン」の役割"
  - "密集地帯（ラックやモール）の最前線に巨体で突入し、相手を排除して味方のボールを守る「クリーンアウト」のスペシャリスト"
  - "ラインアウトにおいて、ソラ（4番）などのジャンパーをその剛腕で高く安定して持ち上げる「リフト」の要"


commonMistakes:
  - "スクラムを真っ直ぐではなく、斜めに押してしまう（反則：スクラムの不正な押し）"
  - "ラックへの突入時、頭が腰より低くなってしまう"
  - "密集戦で横から参加してしまう（反則：オフサイド/サイドエントリー）"

levelGuide:
  beginner: "スクラムが始まった時に、地面をどれだけ力強く踏みしめているかを見る"
  intermediate: "密集（ラック）で相手を何人も弾き飛ばし、道を作っているかを見る"

cta: "地を這う重戦車、ゴウの衝撃をその肌で感じろ！"
icon: "/positions/lo_5_icon.png"
character: "/positions/lo_5_character.png"

# キャラクター設定
characterName: "ゴウ（轟）"
personality: "寡黙で不愛想、だが誰よりも熱い魂を内に秘めた『重厚な仕事人』。言葉よりも行動（踏み込み）で語るタイプで、一度スクラムを組めば、仲間に勝利の鼓動（ビート）を伝える頼れる存在。"
nameOrigin: "一歩踏み込むだけで地面を震わせ、スクラムの圧力が連動した瞬間にフィールドへ凄まじい“振動”を走らせるその圧倒的な出力から。"
catchphrase: "……地響き（エンジン）を上げろ。俺が押し切る。"

