  - text: "関与の判断スピード"
    timing: "接点形成の一瞬"
    detail: "奪うのか、守備に戻るのかを瞬時に判断しているかを見る"

decision:
  - condition: "タックラーが成立し、ボールが露出している"
    action: "ジャッカル（スティール）を狙う"
    reason: "最速でボールに関与し、攻守を即座に切り替えるため"
  - condition: "相手のサポートが早く、奪取が難しい"
    action: "カウンターラックに参加"
    reason: "圧力をかけて相手の攻撃テンポを崩すため"
  - condition: "接点への到達が遅れた"
    action: "即座に守備ラインへ復帰"
    reason: "無理に関与せず、次の局面で再びスティールを狙うため"

decisionConversation:
  - speaker: "リッチーくん"
    message: "ロウガって、いつの間にかボールのところにいるよね…？"
  - speaker: "ロウガ"
    message: "…匂うんだ。次にこぼれる場所がな。"
  - speaker: "リッチーくん"
    message: "えっ、見てるんじゃなくて感じてるの！？"
  - speaker: "ロウガ"
    message: "考える前に動く。それだけだ。"
  - speaker: "ライゾウ"
    message: "彼は流れが変わる“瞬間”に現れる存在だ。ロウガがボールを奪った時、ゲームの主導権は一気にこちらへ傾く。あの一瞬を作れるのが、オープンサイドフランカーなんだ"

scenes:
