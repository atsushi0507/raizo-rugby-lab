id: "ctb12"
number: 12
name: "センター（インサイド）"
nameEn: "Center (Inside)"
category: "バックス"
nickname: "Breaker"
catch: "勝利への道を物理的にこじ開ける突撃隊長"

watchPoints:
  - text: "コンタクトの強度"
    timing: "ディフェンスラインにぶつかる瞬間"
    detail: "相手のタックルを跳ね飛ばし、強引にゲインラインを越える力強さを見ている"
  - text: "オフロードパスの予備動作"
    timing: "タックルを受けている最中"
    detail: "捕まりながらも腕を出し、次の仲間にボールを繋ぐ技術を見ている"
  - text: "ライゾウ（10番）との距離感"
    timing: "攻撃ライン形成時"
    detail: "10番を助けるセカンドレシーバーとして、いつでもパスを受けられる位置にいるかを見ている"

decision:
  - condition: "目の前に壁が立ちふさがる"
    action: "真っ向からクラッシュ（突撃）"
    reason: "自らが起点となりディフェンスを引き付け、外側にスペースを作るため"
  - condition: "相手のタックルが甘い"
    action: "ハンドオフで弾き飛ばす"
    reason: "一人でディフェンスを破壊し、そのままラインブレイクを狙うため"
  - condition: "敵に囲まれ倒されそうになる"
    action: "オフロードパスを狙う"
    reason: "プレーを停滞させず、仲間のサポートを活かして攻撃を継続させるため"

decisionConversation:
  - speaker: "リッチーくん"
    message: "うわああ！すごい音！あんなに大きな人たちの中に一人で突っ込んでいくなんて、怖くないの？"
  - speaker: "ガイ"
    message: "怖がってたらこの壁は壊せねえ。俺がここを通れば、その先に最高の景色（ゴール）が待ってるからな。"
  - speaker: "リッチーくん"
    message: "かっこいい…！あ、倒されそうなのにまだボールを放さないよ！"
  - speaker: "ライゾウ"
    message: "それが彼の仕事だ。12番はBKの中で最もフォワードに近いタフさが求められる。彼が体を張ってゲインラインを割ってくれるから、僕の戦略が完成するんだ。まさに、チームの誇る『不屈の矛』だ。"

scenes:
  - "敵の密集に猛スピードで突っ込み、ディフェンスをなぎ倒す場面"
  - "強烈なハンドオフで相手を突き放し、前進し続ける瞬間"
  - "激しいコンタクトの中でもボールを離さず、味方に繋ぐ場面"

commonMistakes:
  - "壁を打ち破る激しい衝撃で、ボールを前方に落としてしまう（ノックフォワード）"
  - "深く突き刺さりすぎて味方のサポートが遅れ、倒れたあとにボールを放さない（ノットリリースザボール）"
  - "強引に突破を狙うあまり、タックルされながら前方にパスを投げてしまう（スローフォワード）"

relations:
  - number: 10
    name: "スタンドオフ（ライゾウ）"
    role: "戦略の実行パートナー"
    description: "ライゾウの脳内にあるプランを、物理的な破壊力で形にする"
  - number: 13
    name: "アウトサイドセンター"
    role: "突破の相棒"
    description: "自分が作った穴を、さらに広げてスピードで抜き去るパートナー"
  - number: 14
    name: "ウィング（フウガ）"
    role: "チャンスの提供"
    description: "ディフェンスラインを切り裂き、最後に彼を走らせるためのスペースを作る"

skills:
  - name: "クラッシュ"
    description: "相手のディフェンスラインに真っ向からぶつかり、突破する技術"
  - name: "ハンドオフ"
    description: "迫りくるタックラーを片手で突き放し、前進を止めない技"
  - name: "オフロードパス"
    description: "タックルされながらも倒れずに、味方にパスを繋ぐ高度なスキル"

roles:
  - "ディフェンスラインの物理的破壊（Breaker）"
  - "BKラインにおける守備の要"
  - "10番をサポートする第2の司令塔"

levelGuide:
  beginner: "ぶつかった後に、相手を押し戻しているかを見る"
  intermediate: "倒されながらも、どうやって次の選手にボールを繋いでいるかを見る"

cta: "なぜセンターは、わざわざ相手がいる場所に突っ込んでいくのか？"
icon: "/positions/ctb_12_icon.png"
character: "/positions/ctb_12_character.png"

# キャラクター設定
characterName: "牙威（ガイ）"
personality: "不言実行で義理堅い突撃隊長。どんなに厚い壁も自分の体でこじ開け、仲間に道を拓く\"不屈のブレイカー\"。"
nameOrigin: "停滞を打ち破る「牙」となり、相手の守備を後退させる「威」圧的な一撃を持つことから。"
catchphrase: "怖がってたらこの壁は壊せねえ。"

