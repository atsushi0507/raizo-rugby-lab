id: "wtb11"
number: 11
name: "ウィング（ブラインドサイド）"
nameEn: "Blind Wing"
category: "バックス"
nickname: "The Spring"
catch: "鋼のバネで道を拓き、獲物を仕留めるハイブリッド・フィニッシャー"

# 主な役割
roles:
  - "攻撃の最終局面でボールを受け、ステップやパワーを駆使してトライを取り切る「最強のフィニッシャー」"
  - "ブラインドサイド（狭い側）の攻防において、数少ないチャンスを確実に得点へ繋げる仕事人"
  - "ハイパント（高いキック）に対する空中戦の競り合いや、カバーディフェンスによる守備への貢献"

watchPoints:
  - text: "相手の芯を「ずらす」ステップ"
    timing: "ディフェンスと接触する直前"
    detail: "正面からぶつかるのではなく、絶妙な角度で相手の力を逃がし、弾かれるように前進しているかを見ている"
  - text: "コンタクト後の加速"
    timing: "タックルを受けた瞬間"
    detail: "捕まったと思われた状態から、強靭なバネのように体をひねり、さらにもう一歩前へ進んでいるかを見ている"
  - text: "インゴールへの執着"
    timing: "ゴール前10メートル"
    detail: "どんなに包囲されても、最後の一押しでボールをグラウンディングさせる執念を見ている"

decision:
  - condition: "目の前に複数のディフェンスが壁を作っている"
    action: "パワーを込めたバネのステップで『ずらし』を狙う"
    reason: "相手の連携にズレを生じさせ、最も弱い部分を強行突破して道を切り拓くため"
  - condition: "外側をジン（13番）やゲン（15番）が走っている"
    action: "囮となってディフェンスを引きつける"
    reason: "自分が脅威となることで相手の注意を逸らし、チーム全体でトライを奪うため"
  - condition: "相手がキックでエリアを狙ってくる"
    action: "野性的な嗅覚での猛追とカバー"
    reason: "失点を防ぐだけでなく、即座にカウンター（逆襲）へ転じるための起点を確保するため"

decisionConversation:
  - speaker: "リッチーくん"
    message: "ダンくん！今すごかった！タックルされたのに、ポーンって跳ねるみたいに前に進んでいったよ！"
  - speaker: "ダン"
    message: "……俺のバネは、止められない。ずらした瞬間に、勝負はついてる。"
  - speaker: "リッチーくん"
    message: "ステップって言うの？あの動き、相手が完全に逆に行っちゃってたよ！"
  - speaker: "ダン"
    message: "正面からぶつかるだけが突破じゃない。相手の芯を半歩ずらす。それだけで壁は崩れる。"
  - speaker: "リッチーくん"
    message: "あっ、今度はゴール前だ！3人に囲まれてるのに……えっ、体を回転させてトライした！"
  - speaker: "ダン"
    message: "ゴールラインが見えたら、止まる理由がない。何人来ようが、最後の1メートルは俺のものだ。"
  - speaker: "フウガ"
    message: "……あいつとはタイプが違う。でも、左にダンがいると安心する。俺が走れないところを、あいつが仕留めてくれるから。"
  - speaker: "リッチーくん"
    message: "フウガくんがそう言うなんて、すごい信頼だね！"
  - speaker: "ライゾウ"
    message: "フウガが『光』のようなスピードで軌道を駆け抜けるなら、ダンはどんな壁も弾き飛ばす『バネ』だ。ステップのキレとパワーを兼ね備えたハイブリッド。彼が左に控えているからこそ、僕たちの攻撃は左右どちらからでも仕留められる。バックスリーの、最後の爪牙だ。"

scenes:
  - "密集地帯をわずかなステップで通り抜け、残像を残して独走する場面"
  - "ゴールライン直前でタックルを受けながらも、体を回転させて強引にトライを決める瞬間"
  - "キックされたボールを空中で競り合い、ヒョウのような跳躍で奪い取るシーン"

relations:
  - number: 14
    name: "ウィング"
    role: "左右のフィニッシャー"
    description: "スピードのフウガとハイブリッドの11番。性格は対照的だが、互いにトライ数で競い合う良きライバル"
  - number: 13
    name: "アウトサイドセンター"
    role: "加速の導火線"
    description: "ジンの熱いリードが作ったわずかな隙を、絶対的な精度で仕留め切る信頼関係"
  - number: 15
    name: "フルバック"
    role: "バックスリーの戦友"
    description: "共に最後尾を守り、カウンターの際はどちらが仕留めるかを瞬時に判断し合う阿吽の呼吸"

skills:
  - name: "ステップ"
    description: "相手の芯を半歩ずらす足さばきで、タックルを外して突破する技術"
  - name: "コンタクト後のボールキャリー"
    description: "タックルを受けても倒れず、体幹の強さで前進を続ける推進力"
  - name: "ハイボールキャッチ"
    description: "相手のキックに対して空中で競り合い、確実にボールを確保する技術"

commonMistakes:
  - "パワーを過信して無理に突っ込み、サポートを孤立させてしまう"
  - "トライを急ぐあまり、グラウンディングが不十分になる（ノートライ）"
  - "ディフェンス時に外側を空けすぎてしまう"

levelGuide:
  beginner: "タックルされても倒れずに、どれだけ前へ進めているかを見る"
  intermediate: "ステップを踏んだ瞬間に、相手のディフェンスラインがどう崩れているかを見る"

cta: "跳ねる剛勇、弾ける加速！『ザ・スプリング』がもたらす一撃の快感に酔いしれろ！"
icon: "/positions/lw_11_icon.png"
character: "/positions/lw_11_character.png"

# キャラクター設定
characterName: "ダン"
personality: "寡黙で職人気質のフィニッシャー。言葉より行動で語り、ボールを持った瞬間に野性的な闘志を剥き出しにする\"鋼のバネ\"。"
nameOrigin: "衝撃を受けて跳ね返り、一瞬で加速し、貫く。接触を\"弾いて\"さらに前へ出るプレースタイルから。"
catchphrase: "ゴールラインが見えたら、止まる理由がない。"

createdAt: "2026-04-30"
updatedAt: "2026-04-30"
isFeatured: true